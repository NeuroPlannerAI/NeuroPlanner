<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FAF7F4">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.svg">
<title>Brain Dump</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAF7F4;--bg2:#F2EDEA;--card:#FFFFFF;--border:#E8E2DC;--border2:#DDD5CC;
  --t1:#2C2520;--t2:#6B5E54;--t3:#A09484;--t4:#C4B8AC;
  --accent:#C47E8A;--green:#6BAF8D;--amber:#C4A44E;--coral:#C48A7E;
  --teal:#6BA4A0;--lilac:#9E8ABF;--warm:#B8956A;--blue:#7E9EC4;
  --cat-hygiene:#D4A0B8;--cat-household:#7EB8B0;--cat-bean:#C4A070;
  --cat-creative:#A890C4;--cat-exercise:#80B898;--cat-reminders:#C4B060;--cat-selfcare:#C49090;
  --shadow:0 1px 3px rgba(44,37,32,.06),0 4px 12px rgba(44,37,32,.04);
  --shadow2:0 2px 8px rgba(44,37,32,.08),0 8px 24px rgba(44,37,32,.06);
}
.dark{
  --bg:#1A1818;--bg2:#222020;--card:#2A2828;--border:#3A3636;--border2:#484242;
  --t1:#E8E2DC;--t2:#A09484;--t3:#706458;--t4:#4A4038;
  --shadow:0 1px 3px rgba(0,0,0,.15),0 4px 12px rgba(0,0,0,.1);
  --shadow2:0 2px 8px rgba(0,0,0,.2),0 8px 24px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--t1);font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;height:100dvh;overflow:hidden;overscroll-behavior:none}
body{display:flex;flex-direction:column;padding-top:env(safe-area-inset-top)}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:16px;transition:opacity .12s,transform .12s}
button:active{transform:scale(.97);opacity:.85}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--t1)}
input::placeholder{color:var(--t3)}
::-webkit-scrollbar{width:0;display:none}

.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.pad{max-width:540px;margin:0 auto;padding:16px 16px 32px}

/* Tab bar */
.tabs{display:flex;background:var(--card);border-top:1px solid var(--border);padding:4px 6px calc(4px + env(safe-area-inset-bottom));gap:2px;flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:8px 0;border-radius:12px;color:var(--t3);font-size:10px;font-weight:700;letter-spacing:.3px}
.tab.on{color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,transparent)}
.tab i{font-style:normal;font-size:18px;line-height:1}

/* Toast */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);padding:12px 24px;border-radius:16px;font-weight:800;font-size:14px;z-index:2000;opacity:0;transition:all .35s cubic-bezier(.22,1,.36,1);pointer-events:none;box-shadow:var(--shadow2);color:var(--card)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Cards */
.card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.card-p{padding:16px}

/* Task blocks */
.task-block{display:flex;align-items:stretch;border-radius:14px;background:var(--card);box-shadow:var(--shadow);margin-bottom:6px;overflow:hidden;min-height:56px;transition:opacity .3s}
.task-block.done{opacity:.45}
.task-edge{width:5px;flex-shrink:0;border-radius:14px 0 0 14px}
.task-body{flex:1;display:flex;align-items:center;gap:12px;padding:12px 14px}
.task-check{width:32px;height:32px;border-radius:10px;border:2.5px solid var(--t4);background:transparent;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--card);font-weight:900;flex-shrink:0}
.task-check.done{background:var(--green);border-color:var(--green)}
.task-info{flex:1;min-width:0}
.task-name{font-size:15px;font-weight:600;color:var(--t1);line-height:1.3}
.task-block.done .task-name{text-decoration:line-through;color:var(--t3)}
.task-dur{font-size:11px;color:var(--t3);font-weight:600;margin-top:1px}
.task-actions{display:flex;gap:4px;align-items:center;flex-shrink:0}
.task-focus-btn{font-size:11px;font-weight:800;color:var(--green);background:color-mix(in srgb,var(--green) 10%,var(--card));border:1px solid color-mix(in srgb,var(--green) 20%,var(--border));border-radius:8px;padding:6px 10px}
.task-del{color:var(--t4);font-size:18px;padding:6px;line-height:1}

/* Duration bar */
.dur-bar{height:3px;background:var(--bg2);border-radius:2px;margin-top:4px;overflow:hidden}
.dur-fill{height:100%;border-radius:2px}

/* Block headers */
.block-hdr{display:flex;align-items:center;gap:8px;padding:14px 4px 8px}
.block-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.block-label{font-size:12px;font-weight:800;color:var(--t2);letter-spacing:.5px}
.block-time{font-size:11px;color:var(--t3);font-weight:600}
.block-line{flex:1;height:1px;background:var(--border)}

/* Whats next */
.next-bar{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;border-left:4px solid var(--accent)}
.next-label{font-size:10px;font-weight:800;color:var(--t3);letter-spacing:.5px;text-transform:uppercase}
.next-task{font-size:15px;font-weight:700;color:var(--t1)}

/* Progress ring */
.ring-wrap{position:relative;width:72px;height:72px;flex-shrink:0}
.ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-pct{font-size:18px;font-weight:900;line-height:1}
.ring-sub{font-size:8px;font-weight:700;color:var(--t3);letter-spacing:.5px}

/* Streaks */
.streak{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:800;background:color-mix(in srgb,var(--green) 8%,var(--bg2));color:var(--green);border:1px solid color-mix(in srgb,var(--green) 15%,var(--border))}

/* Category tags */
.cat-tag{border-radius:10px;padding:10px 14px;font-size:14px;font-weight:700;border:1.5px solid var(--border);background:var(--card);color:var(--t1);display:inline-flex;align-items:center;gap:6px;box-shadow:var(--shadow)}
.cat-tag.added{border-color:var(--green);color:var(--green);background:color-mix(in srgb,var(--green) 6%,var(--card))}
.cat-tag .dur{font-size:11px;color:var(--t3);font-weight:600}

/* Mode cards */
.mode-card{border-radius:16px;padding:18px 16px;background:var(--card);box-shadow:var(--shadow);border:2px solid var(--border);text-align:left}
.mode-card:active{border-color:var(--accent)}

/* Bottom sheet */
.sheet-bg{position:fixed;inset:0;background:rgba(44,37,32,.3);z-index:900;opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-bg.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:24px 24px 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom));z-index:901;transform:translateY(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);box-shadow:0 -4px 30px rgba(44,37,32,.12);max-height:70dvh;overflow-y:auto}
.sheet.show{transform:translateY(0)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(44,37,32,.4);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal-box{background:var(--card);border-radius:24px;max-width:500px;width:100%;max-height:85dvh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow2)}
.modal-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}

/* Timer overlay */
.timer{position:fixed;inset:0;background:var(--bg);z-index:1100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px}

/* Mood buttons */
.mood-btn{flex:1;padding:10px 0;border-radius:10px;text-align:center;background:var(--card);border:1.5px solid var(--border);font-size:13px;font-weight:700;color:var(--t2)}
.mood-btn.on{border-width:2px}

/* Fill bars */
.fill-bar{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.fill-inner{height:100%;border-radius:3px;transition:width .5s ease}

.wrap{display:flex;flex-wrap:wrap;gap:6px}

@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="sheet-bg" id="sheetBg"></div>
<div class="sheet" id="sheet"></div>
<div class="page" id="page"></div>
<div class="tabs" id="tabs"></div>

<script>
// ── STORAGE ──
const LS=(k,d)=>{try{const v=localStorage.getItem("bd3_"+k);return v?JSON.parse(v):d}catch{return d}};
const SS=(k,v)=>{try{localStorage.setItem("bd3_"+k,JSON.stringify(v))}catch{}};
const TODAY=()=>new Date().toISOString().split("T")[0];
const WK=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const weekDates=r=>{const d=new Date(r+"T12:00:00"),dy=d.getDay(),df=d.getDate()-dy+(dy===0?-6:1),m=new Date(d);m.setDate(df);return Array.from({length:7},(_,i)=>{const x=new Date(m);x.setDate(m.getDate()+i);return x.toISOString().split("T")[0]})};
const fmtD=s=>new Date(s+"T12:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});
const fmtS=s=>new Date(s+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
const fmtM=m=>m>=60?Math.floor(m/60)+"h"+(m%60?" "+m%60+"m":""):m+"m";

const BLOCKS=[
  {key:"morning",label:"Morning",cap:180,color:"var(--amber)",hex:"#C4A44E"},
  {key:"afternoon",label:"Afternoon",cap:240,color:"var(--accent)",hex:"#C47E8A"},
  {key:"evening",label:"Evening",cap:180,color:"var(--lilac)",hex:"#9E8ABF"},
  {key:"anytime",label:"Anytime",cap:999,color:"var(--teal)",hex:"#6BA4A0"}
];

const CATS={
  hygiene:{l:"Pamper + Hygiene",ic:"✦",c:"var(--cat-hygiene)",
    t:[["Fake tan",40],["Hair wash day",30],["Do my nails",30],["Full skincare routine",25],["Relax bath",45],["Everything shower",60],["Face mask",25],["Shave legs",15],["Deep condition hair",30],["Exfoliate",10],["Eyebrow tidy",10],["Moisturise properly",10],["Dry brush",10],["Lip scrub + balm",5]],
    x:[["Hair oil treatment",25],["Foot soak + scrub",30],["Gua sha session",20],["Clean makeup brushes",20],["Scalp massage",10],["Sheet mask",25],["Body butter",10],["Organise skincare shelf",15]]},
  household:{l:"Sort The House",ic:"◈",c:"var(--cat-household)",
    t:[["Change bedding",20],["Wash the floors",30],["Hoover upstairs",15],["Hoover downstairs",15],["Put a wash on",5],["Hang washing up",10],["Weekly food shop",60],["Clean bathroom",30],["Wipe kitchen sides",10],["Empty all bins",10],["Tidy living room",15],["Sort the fridge",15],["Ironing pile",30],["Dust surfaces",15],["Descale kettle",10]],
    x:[["Clean windows",25],["Organise under sink",20],["Deep clean microwave",15],["Wipe door handles",10],["Sort recycling",10],["Tidy junk drawer",15],["Wash kitchen towels",10],["Defrost freezer",45]]},
  bean:{l:"Bean",ic:"♥",c:"var(--cat-bean)",
    t:[["Walk Bean (15 min)",20],["Walk Bean (30 min)",35],["Walk Bean (45 min)",50],["Walk Bean (1 hour)",65],["Bath Bean",45],["Wash Bean's toys",20],["Wash Bean's blankets",15],["Meal prep for Bean",30],["Brush Bean",15],["Trim Bean's nails",10],["Clean Bean's bowls",5],["Refill treat jar",5]],
    x:[["Training session (10 min)",15],["Enrichment toy time",15],["Clean Bean's bed",20],["Worm/flea treatment",5],["New walk route",50],["Dental chew",5],["Paw wash",10]]},
  creative:{l:"Creative (phone down)",ic:"◐",c:"var(--cat-creative)",
    t:[["Draw or doodle (20 min)",25],["Journal / brain dump",15],["Try a new recipe",45],["Rearrange a room",30],["DIY project",45],["Write a letter",20],["Colouring book",25],["Read for 30 mins",30],["Knit or crochet",30],["Try calligraphy",25],["Redecorate a shelf",15]],
    x:[["Collage from magazines",30],["Bake from scratch",50],["Sketch window view",25],["Make homemade cards",25],["Watercolour painting",30],["Press flowers",15]]},
  exercise:{l:"Move Your Body",ic:"△",c:"var(--cat-exercise)",
    t:[["30 min walk with podcast",35],["Yoga session",30],["10 min stretch",10],["Dance around the house",15],["Pilates video",25],["Go for a run",35],["Skipping rope (10 min)",12],["HIIT (15 min)",20],["Ab workout",15],["Stairs x10",10],["YouTube workout",25]],
    x:[["Swim at local pool",50],["Park workout",30],["Gentle walk",20],["Resistance bands",20],["Foam roller",15],["Gardening",30]]},
  reminders:{l:"Life Admin",ic:"◇",c:"var(--cat-reminders)",
    t:[["Order meds",10],["Finance spreadsheet",30],["Check bills are paid",10],["Book GP appointment",10],["Therapy session",60],["Check bank balance",5],["Reply to that message",5],["Book dentist",5],["Renew prescription",10],["Check direct debits",10],["File paperwork",15]],
    x:[["Cancel unused subscriptions",10],["Check credit score",5],["Update CV",30],["That thing you keep avoiding",20],["Back up phone photos",15],["Unsubscribe from junk emails",15]]},
  selfcare:{l:"Looking After You",ic:"○",c:"var(--cat-selfcare)",
    t:[["Take your meds",2],["Drink 2L water",1],["No phone for 1 hour",60],["Bed before 11pm",1],["Call someone you love",15],["Read 10 pages",15],["Gratitude list (3 things)",5],["Fresh air (15 min)",15],["Make your bed",3],["Eat a proper meal",20]],
    x:[["Noise cancelling break",15],["Weighted blanket (20 min)",20],["Stimming break",10],["Sensory reset",15],["Pomodoro: 25/5",30],["Low demand hour",60]]}
};

const KW={hygiene:["tan","hair","nails","skin","bath","shower","face","moistur","shav","brow","lash","lip","scrub","mask"],household:["hoover","vacuum","clean","dust","iron","floor","bin","fridge","kitchen","oven","window","tidy","shop","cook","laundry","wipe","descale","bedding"],bean:["bean","dog","pet","paw","treat","bowl","toy","blanket"],creative:["draw","paint","journal","write","read","knit","crochet","colour","craft","diy","bake","collage","letter"],exercise:["walk","run","yoga","stretch","dance","pilates","gym","swim","hiit","workout","skip","stairs"],reminders:["book","appointment","dentist","doctor","gp","therapy","meds","order","bill","bank","finance","prescription"],selfcare:["water","sleep","bed","phone","screen","grateful","meal","eat","rest","break","sensory"]};
const gCat=t=>{const l=t.toLowerCase();if(l.includes("bean"))return"bean";let b="selfcare",s=0;for(const[c,ws]of Object.entries(KW)){const n=ws.filter(w=>l.includes(w)).length;if(n>s){s=n;b=c}}return b};

const MODES=[
  {k:"chill",l:"Chill Day",d:"Light and easy. Self care, Bean, something creative.",ic:"○",cats:["selfcare","bean","creative"],max:120},
  {k:"pamper",l:"Pamper Day",d:"Skin, hair, nails, bath. Full reset.",ic:"✦",cats:["hygiene","selfcare"],max:180},
  {k:"chores",l:"Chores Blitz",d:"Sort the house. Top to bottom.",ic:"◈",cats:["household","selfcare","bean"],max:240},
  {k:"work",l:"Work Day",d:"Minimal. Morning + evening tasks only.",ic:"◇",cats:["selfcare","bean","reminders"],max:90},
  {k:"catchup",l:"Catch-Up Day",d:"Life admin, bills, that stuff you keep putting off.",ic:"◇",cats:["reminders","household","selfcare"],max:180},
  {k:"active",l:"Active Day",d:"Move, walk Bean, get outside.",ic:"△",cats:["exercise","bean","selfcare"],max:150},
  {k:"creative",l:"Creative Day",d:"Phone down. Make something. Reset.",ic:"◐",cats:["creative","selfcare"],max:180},
  {k:"custom",l:"Build My Own",d:"Pick from everything.",ic:"◉",cats:Object.keys(CATS),max:300}
];

const ENERGY=[{v:3,l:"High energy",d:"Bring it on",c:"var(--green)"},{v:2,l:"Medium",d:"Steady pace",c:"var(--amber)"},{v:1,l:"Low battery",d:"Gentle day",c:"var(--coral)"}];
const MOODS=[{v:5,l:"Great",c:"var(--green)"},{v:4,l:"Good",c:"var(--teal)"},{v:3,l:"Okay",c:"var(--amber)"},{v:2,l:"Low",c:"var(--accent)"},{v:1,l:"Rough",c:"var(--coral)"}];
const ADD_MSG=["Added!","On the list!","Locked in!","Sorted!","Got it!","Planned!"];
const DONE_MSG=["Done!","Smashed it.","Ticked off.","Boom.","Sorted.","Nice one.","On a roll."];

const REC_DEF=[
  {text:"Take your meds",cat:"selfcare",block:"morning",days:[0,1,2,3,4,5,6],id:1,mins:2},
  {text:"Walk Bean (30 min)",cat:"bean",block:"morning",days:[0,1,2,3,4,5,6],id:2,mins:35},
  {text:"Drink 2L water",cat:"selfcare",block:"anytime",days:[0,1,2,3,4,5,6],id:3,mins:1},
  {text:"Make your bed",cat:"selfcare",block:"morning",days:[0,1,2,3,4,5,6],id:4,mins:3}
];

const SHOP={Essentials:["Bread","Milk","Eggs","Butter","Cheese","Chicken","Mince","Rice","Pasta","Tinned tomatoes","Onions","Potatoes","Bananas","Apples"],Snacks:["Crisps","Biscuits","Chocolate","Popcorn","Cereal bars","Fruit","Yoghurts","Nuts"],Freezer:["Frozen pizza","Chips","Ice cream","Frozen veg","Fish fingers","Garlic bread","Waffles"],"Household bits":["Washing up liquid","Loo roll","Bin bags","Kitchen roll","Laundry tabs","Surface spray"],"ADHD friendly":["Pre-chopped veg","Microwave rice pouches","Ready meals for bad days","Meal deal bits","Protein bars","Frozen fruit for smoothies"]};

// ── STATE ──
let S={
  tasks:LS("tasks",[]),date:TODAY(),tab:"today",
  spending:LS("spending",{budget:20,items:[]}),
  moods:LS("moods",{}),checkins:LS("checkins",{}),
  energy:LS("energy",{}),modes:LS("modes",{}),
  recurring:LS("recurring",REC_DEF),rolled:LS("rolled",""),
  streaks:LS("streaks",{}),dark:LS("dark",false),
  openCats:{},pools:{}
};
const sv=()=>{SS("tasks",S.tasks);SS("spending",S.spending);SS("moods",S.moods);SS("checkins",S.checkins);SS("energy",S.energy);SS("modes",S.modes);SS("recurring",S.recurring);SS("rolled",S.rolled);SS("streaks",S.streaks);SS("dark",S.dark)};

function boot(){
  const td=TODAY();if(S.rolled===td)return;
  // Rollover
  const y=new Date();y.setDate(y.getDate()-1);const ys=y.toISOString().split("T")[0];
  const inc=S.tasks.filter(t=>t.date===ys&&!t.done);
  if(inc.length){const ids=new Set(inc.map(t=>t.id));S.tasks=S.tasks.filter(t=>!ids.has(t.id));inc.forEach(t=>S.tasks.push({...t,id:D(),date:td,rolledOver:true}))}
  // Recurring
  const dow=new Date().getDay(),adj=dow===0?6:dow-1;
  const have=new Set(S.tasks.filter(t=>t.date===td).map(t=>t.text));
  S.recurring.forEach(r=>{if(r.days.includes(adj)&&!have.has(r.text))S.tasks.push({id:D(),text:r.text,done:false,cat:r.cat,date:td,rolledOver:false,block:r.block,mins:r.mins||15})});
  updStreaks();S.rolled=td;sv();
}
function D(){return Date.now()+Math.random()}

function updStreaks(){
  const track=["Take your meds","Walk Bean","Drink 2L water","Make your bed"];
  track.forEach(task=>{
    let c=0;for(let i=0;i<30;i++){
      const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split("T")[0];
      if(S.tasks.find(t=>t.date===ds&&t.text.startsWith(task.split(" ").slice(0,2).join(" "))&&t.done))c++;else if(i>0)break;
    }
    S.streaks[task]=c;
  });
}

// ── HELPERS ──
function h(tag,a,...ch){const el=document.createElement(tag);if(a)for(const[k,v]of Object.entries(a)){if(k==="style"&&typeof v==="object")Object.assign(el.style,v);else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="className")el.className=v;else el.setAttribute(k,v)}ch.flat(9).forEach(c=>{if(c!=null)el.append(typeof c==="string"||typeof c==="number"?String(c):c)});return el}

function toast(msg,bg){const t=document.getElementById("toast");t.textContent=msg;t.style.background=bg||"var(--green)";t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1800)}

function showSheet(content){
  const bg=document.getElementById("sheetBg"),sh=document.getElementById("sheet");
  sh.innerHTML="";sh.append(content);
  bg.classList.add("show");sh.classList.add("show");
  bg.onclick=hideSheet;
}
function hideSheet(){document.getElementById("sheetBg").classList.remove("show");document.getElementById("sheet").classList.remove("show")}

function addTaskWithPicker(text,cat,mins){
  if(!text.trim())return;
  const c=cat||gCat(text),m=mins||15;
  const content=h("div",{});
  content.append(h("div",{style:{fontSize:"16px",fontWeight:800,color:"var(--t1)",marginBottom:"2px"}},"When?"));
  content.append(h("div",{style:{fontSize:"13px",color:"var(--t2)",marginBottom:"16px"}},text+" ("+fmtM(m)+")"));
  const grid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}});
  const dayT=S.tasks.filter(t=>t.date===S.date);
  BLOCKS.forEach(b=>{

function toggleTask(id){const t=S.tasks.find(x=>x.id===id);if(!t)return;if(!t.done)toast(DONE_MSG[Math.floor(Math.random()*DONE_MSG.length)],"var(--green)");t.done=!t.done;updStreaks();sv();render()}
function delTask(id){S.tasks=S.tasks.filter(t=>t.id!==id);sv();render()}

function genPlan(modeKey,eLvl){
  const mode=MODES.find(m=>m.k===modeKey);if(!mode)return;
  const td=S.date,existing=S.tasks.filter(t=>t.date===td),have=new Set(existing.map(t=>t.text));
  const mult=eLvl===3?1.2:eLvl===1?0.6:1;
  const budget=Math.round(mode.max*mult);
  let total=existing.reduce((s,t)=>s+(t.mins||15),0);
  const pool=[];
  mode.cats.forEach(ck=>{const cat=CATS[ck];if(cat)cat.t.forEach(([text,mins])=>{if(!have.has(text))pool.push({text,mins,cat:ck})})});
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}
  const caps={morning:eLvl===1?60:90,afternoon:modeKey==="work"?0:120,evening:90,anytime:60};
  const used={morning:0,afternoon:0,evening:0,anytime:0};
  pool.forEach(item=>{
    if(total+item.mins>budget)return;
    let best="anytime";
    for(const b of["morning","afternoon","evening"])if(used[b]+item.mins<=caps[b]){best=b;break}
    if(best!=="anytime"||used.anytime+item.mins<=caps.anytime){
      S.tasks.push({id:D(),text:item.text,done:false,cat:item.cat,date:td,rolledOver:false,block:best,mins:item.mins});
      used[best]+=item.mins;total+=item.mins;
    }
  });
  S.modes[td]=modeKey;S.energy[td]=eLvl;sv();
}

  upd();

  ov.append(
    h("div",{style:{fontSize:"12px",fontWeight:800,color:"var(--t3)",letterSpacing:"1px"}},"FOCUS MODE"),
    h("div",{style:{height:"16px"}}),

    const cat=CATS[key];if(!cat)return;
    const pool=S.pools[key]||cat.t;
    const isOpen=S.openCats[key];
    const isRelevant=relCats.includes(key);
    const card=h("div",{className:"card"});
    const btn=h("button",{style:{width:"100%",display:"flex",alignItems:"center",gap:"10px",padding:"14px 16px",textAlign:"left"},onClick:()=>{S.openCats[key]=!isOpen;render()}});
    btn.append(h("span",{style:{fontSize:"16px",fontWeight:800,color:cat.c}},cat.ic));
    btn.append(h("span",{style:{flex:1,fontSize:"15px",fontWeight:800,color:isRelevant?"var(--t1)":"var(--t3)"}},cat.l));
    btn.append(h("span",{style:{fontSize:"12px",color:"var(--t3)",fontWeight:600}},pool.length));
    btn.append(h("span",{style:{fontSize:"14px",color:"var(--t4)",transform:isOpen?"rotate(180deg)":"",transition:"transform .2s"}},"▾"));
    card.append(btn);
    if(isOpen){
      const body=h("div",{style:{padding:"0 14px 14px"}});
      const wrap=h("div",{className:"wrap",style:{marginBottom:"8px"}});
      pool.forEach(([task,mins])=>{
        const added=S.tasks.some(t=>t.date===S.date&&t.text===task);
        const tag=h("button",{className:"cat-tag"+(added?" added":""),onClick:()=>{
          if(added)return;
          if(task.includes("food shop")){/* TODO: shop modal */}
          addTaskWithPicker(task,key,mins);
        }});
        if(added)tag.textContent="✓ "+task;
        else{tag.append(task,h("span",{className:"dur"}," "+fmtM(mins)))}
        wrap.append(tag);
      });
      body.append(wrap);
      body.append(h("button",{style:{padding:"8px 14px",border:"1.5px dashed var(--border2)",borderRadius:"10px",color:"var(--t3)",fontSize:"12px",fontWeight:700"},onClick:()=>{S.pools[key]=[...cat.x].sort(()=>Math.random()-.5).slice(0,Math.min(cat.x.length,8));render()}},"↻ Fresh ideas"));
      card.append(body);
    }
    p.append(card);
  });

  // Recurring link
  p.append(h("button",{style:{width:"100%",marginTop:"8px",padding:"16px",background:"var(--card)",boxShadow:"var(--shadow)",borderRadius:"14px",display:"flex",alignItems:"center",gap:"12px",textAlign:"left"},onClick:()=>{/* TODO: recurring modal */toast("Coming soon","var(--amber)")}},
    h("span",{style:{fontSize:"16px",color:"var(--amber)"}},"◇"),
    h("div",{style:{flex:1}},h("div",{style:{fontSize:"14px",fontWeight:800}},"Auto Reminders"),h("div",{style:{fontSize:"11px",color:"var(--t3)",fontWeight:600}},S.recurring.length+" recurring tasks")),
    h("span",{style:{color:"var(--t4)"}},"›")
  ));
  page.append(p);
}

// ── LIFE TAB ──
function rLife(page){
  const p=h("div",{className:"pad"}),td=TODAY();
  p.append(h("div",{style:{fontSize:"22px",fontWeight:900,marginBottom:"16px"}},"Life"));

  // Mood check-in
  const mCard=h("div",{className:"card card-p"});
  mCard.append(h("div",{style:{fontSize:"11px",fontWeight:800,color:"var(--t3)",letterSpacing:".5px",marginBottom:"8px"}},"TODAY'S CHECK-IN"));
  const mRow=h("div",{style:{display:"flex",gap:"6px",marginBottom:"10px"}});
  MOODS.forEach(m=>{const on=S.moods[S.date]===m.v;mRow.append(h("button",{className:"mood-btn"+(on?" on":""),style:{borderColor:on?m.c:"",color:on?m.c:"",background:on?"color-mix(in srgb,"+m.c+" 8%,var(--card))":""},onClick:()=>{S.moods[S.date]=m.v;sv();render()}},m.l))});
  mCard.append(mRow);
  const noteInp=h("input",{style:{width:"100%",background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"10px",padding:"12px",outline:"none",fontSize:"14px"},placeholder:"Anything on your mind today?",value:S.checkins[S.date]||""});
  noteInp.addEventListener("input",()=>{S.checkins[S.date]=noteInp.value;sv()});
  mCard.append(noteInp);p.append(mCard);

  // Streaks
  const sks=Object.entries(S.streaks||{}).filter(([,v])=>v>=0);
  if(sks.length){
    const sCard=h("div",{className:"card card-p"});
    sCard.append(h("div",{style:{fontSize:"11px",fontWeight:800,color:"var(--t3)",letterSpacing:".5px",marginBottom:"8px"}},"STREAKS"));
    sks.forEach(([name,count])=>{
      const row=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid var(--border)"}});
      row.append(h("span",{style:{fontSize:"14px",fontWeight:600,color:"var(--t1)"}},name));
      row.append(h("span",{style:{fontSize:"15px",fontWeight:900,color:count>0?"var(--green)":"var(--t4)"}},count>0?count+" days":"--"));
      sCard.append(row);
    });
    p.append(sCard);
  }

  // Budget tracker
  const budget=S.spending.budget||20;
  const todayItems=(S.spending.items||[]).filter(i=>i.date===td);
  const spent=todayItems.reduce((s,i)=>s+i.amount,0);
  const left=budget-spent;

  const bCard=h("div",{className:"card card-p"});
  bCard.append(h("div",{style:{fontSize:"11px",fontWeight:800,color:"var(--t3)",letterSpacing:".5px",marginBottom:"8px"}},"DAILY BUDGET"));
  bCard.append(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:"10px"}},
    h("div",{style:{fontSize:"36px",fontWeight:900,color:left<0?"var(--coral)":left<5?"var(--amber)":"var(--green)"}},"£"+left.toFixed(2)),
    h("div",{style:{textAlign:"right"}},
      h("div",{style:{fontSize:"12px",color:"var(--t3)",fontWeight:600}},"of £"+budget+" today"),
      spent===0?h("div",{style:{fontSize:"11px",color:"var(--green)",fontWeight:700,marginTop:"2px"}},"No-spend day so far"):null
    )
  ));
  // Budget setting
  const bRow=h("div",{style:{display:"flex",gap:"6px",alignItems:"center",marginBottom:"10px"}});
  bRow.append(h("span",{style:{fontSize:"12px",fontWeight:700,color:"var(--t3)"}},"Daily limit: £"));
  const bInp=h("input",{type:"number",style:{width:"60px",background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"8px",padding:"8px",outline:"none",fontWeight:700,textAlign:"center"},value:String(budget)});
  bInp.addEventListener("change",()=>{S.spending.budget=parseFloat(bInp.value)||0;sv();render()});
  bRow.append(bInp);bCard.append(bRow);
  // Add spend
  const addR=h("div",{style:{display:"flex",gap:"6px",marginBottom:"10px"}});
  const descI=h("input",{style:{flex:1,background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"10px",padding:"10px",outline:"none",fontSize:"14px"},placeholder:"What for?"});
  const amtI=h("input",{type:"number",step:"0.01",style:{width:"65px",background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"10px",padding:"10px",outline:"none",fontSize:"14px"},placeholder:"£"});
  const doAdd=()=>{const a=parseFloat(amtI.value);if(isNaN(a)||a<=0)return;S.spending.items=[...(S.spending.items||[]),{amount:a,desc:descI.value||"Something",date:td,id:D()}];sv();toast("-£"+a.toFixed(2),"var(--coral)");render()};
  descI.addEventListener("keydown",e=>{if(e.key==="Enter")doAdd()});
  amtI.addEventListener("keydown",e=>{if(e.key==="Enter")doAdd()});
  addR.append(descI,amtI,h("button",{style:{background:"var(--amber)",borderRadius:"10px",padding:"10px 14px",color:"#fff",fontWeight:800,fontSize:"16px",flexShrink:0},onClick:doAdd},"+"));
  bCard.append(addR);
  todayItems.forEach(item=>bCard.append(h("div",{style:{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid var(--border)"}},
    h("span",{style:{fontSize:"14px",color:"var(--t2)",fontWeight:600}},item.desc),
    h("span",{style:{fontSize:"14px",fontWeight:700,color:"var(--coral)"}},"-£"+item.amount.toFixed(2))
  )));
  p.append(bCard);

  // Recurring
  const rCard=h("div",{className:"card card-p"});
  rCard.append(h("div",{style:{fontSize:"11px",fontWeight:800,color:"var(--t3)",letterSpacing:".5px",marginBottom:"8px"}},"AUTO REMINDERS"));
  rCard.append(h("div",{style:{fontSize:"12px",color:"var(--t3)",fontWeight:600,marginBottom:"8px"}},"These tasks appear automatically on set days."));
  S.recurring.forEach(r=>{
    rCard.append(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"8px 0",borderBottom:"1px solid var(--border)"}},
      h("span",{style:{fontSize:"12px",fontWeight:700,color:CATS[r.cat]?.c||"var(--t3)"}},CATS[r.cat]?.ic||"○"),
      h("div",{style:{flex:1}},h("div",{style:{fontSize:"13px",fontWeight:700}},r.text),h("div",{style:{fontSize:"10px",color:"var(--t3)"}},(BLOCKS.find(b=>b.key===r.block)?.label||"Anytime")+" / "+r.days.map(d=>WK[d]).join(", "))),
      h("button",{style:{color:"var(--t4)",fontSize:"16px",padding:"4px"},onClick:()=>{S.recurring=S.recurring.filter(x=>(x.id||x.text)!==(r.id||r.text));sv();render()}},"×")
    ));
  });
  p.append(rCard);

  // Overwhelmed card
  p.append(h("div",{className:"card card-p"},
    h("div",{style:{fontSize:"11px",fontWeight:800,color:"var(--t3)",letterSpacing:".5px",marginBottom:"3px"}},"DOOM SCROLL ALTERNATIVE"),
    h("div",{style:{fontSize:"13px",color:"var(--t2)",fontWeight:600,lineHeight:"1.6"}},["Put the phone in another room for 30 mins.","Set a 25 min timer. Do one task. Then decide.","Open a book. Even 3 pages.","Text someone you haven't spoken to in a while.","Make a cup of tea. Sit without a screen.","Go stand outside for 5 minutes."][Math.floor(Math.random()*6)])
  ));

  page.append(p);
}

// ── INSIGHTS TAB ──
function rReport(page){
  const p=h("div",{className:"pad"});
  const wd=weekDates(S.date);
  p.append(h("div",{style:{fontSize:"22px",fontWeight:900,marginBottom:"14px"}},"This Week"));

  // Week grid
  const wg=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"5px",marginBottom:"16px"}});
  wd.forEach((date,i)=>{
    const dt=S.tasks.filter(t=>t.date===date),d=dt.filter(t=>t.done).length,tot=dt.length;
    const isSel=date===S.date,isT=date===TODAY(),pc=tot>0?(d/tot)*100:0;
    wg.append(h("button",{style:{background:isSel?"color-mix(in srgb,var(--accent) 8%,var(--card))":"var(--card)",border:"1.5px solid "+(isSel?"color-mix(in srgb,var(--accent) 20%,var(--border))":"var(--border)"),borderRadius:"10px",padding:"8px 2px",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",boxShadow:isT?"var(--shadow)":"none"},onClick:()=>{S.date=date;S.tab="today";render()}},
      h("span",{style:{fontSize:"10px",fontWeight:800,color:isSel?"var(--accent)":"var(--t3)",letterSpacing:".5px"}},WK[i]),
      h("span",{style:{fontSize:"17px",fontWeight:900,color:isSel?"var(--t1)":"var(--t2)"}},String(new Date(date+"T12:00:00").getDate())),
      tot>0?h("span",{style:{fontSize:"10px",fontWeight:700,color:pc===100?"var(--green)":"var(--t3)"}},d+"/"+tot):h("span",{style:{fontSize:"10px",color:"var(--t4)"}},"-"),
      S.moods[date]?h("span",{style:{width:"6px",height:"6px",borderRadius:"50%",background:MOODS.find(m=>m.v===S.moods[date])?.c||"var(--t4)"}}):null
    ));
  });
  p.append(wg);

  // Totals
  const cs={};Object.keys(CATS).forEach(k=>cs[k]={t:0,d:0});
  let tA=0,dA=0;
  wd.forEach(date=>S.tasks.filter(t=>t.date===date).forEach(t=>{const c=t.cat||"selfcare";if(cs[c]){cs[c].t++;if(t.done)cs[c].d++}tA++;if(t.done)dA++}));
  const pct=tA>0?Math.round(dA/tA*100):0;

  p.append(h("div",{className:"card card-p",style:{textAlign:"center"}},
    h("div",{style:{fontSize:"48px",fontWeight:900,color:pct>=70?"var(--green)":pct>=40?"var(--amber)":"var(--coral)"}},pct+"%"),
    h("div",{style:{fontSize:"13px",color:"var(--t3)",fontWeight:600}},dA+" of "+tA+" tasks this week")
  ));

  // Mood avg
  const wm=wd.map(d=>S.moods[d]).filter(Boolean);
  if(wm.length){
    const avg=wm.reduce((s,m)=>s+m,0)/wm.length;const ml=MOODS.find(m=>m.v===Math.round(avg));
    p.append(h("div",{className:"card card-p",style:{textAlign:"center"}},
      h("div",{style:{fontSize:"11px",fontWeight:700,color:"var(--t3)"}},"Average mood"),
      h("div",{style:{fontSize:"22px",fontWeight:900,color:ml?.c||"var(--t2)"}},ml?.l||"?")
    ));
  }

  // Category bars
  const catCard=h("div",{className:"card card-p"});
  catCard.append(h("div",{style:{fontSize:"11px",fontWeight:800,color:"var(--t3)",letterSpacing:".5px",marginBottom:"8px"}},"BY CATEGORY"));
  Object.entries(cs).filter(([,v])=>v.t>0).forEach(([k,v])=>{
    const cat=CATS[k],pc=v.t>0?Math.round(v.d/v.t*100):0;
    catCard.append(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}},
      h("span",{style:{fontSize:"12px",fontWeight:700,color:cat.c,width:"18px",textAlign:"center"}},cat.ic),
      h("span",{style:{fontSize:"12px",fontWeight:700,color:"var(--t2)",width:"110px"}},cat.l),
      h("div",{style:{flex:1},className:"fill-bar"},h("div",{className:"fill-inner",style:{width:pc+"%",background:cat.c}})),
      h("span",{style:{fontSize:"11px",fontWeight:800,color:cat.c,width:"36px",textAlign:"right"}},v.d+"/"+v.t)
    ));
  });
  p.append(catCard);

  // Patterns
  const patterns=[];
  const struggling=Object.entries(cs).filter(([,v])=>v.t>=3&&v.d/v.t<.4).map(([k])=>CATS[k].l);
  const strong=Object.entries(cs).filter(([,v])=>v.t>=2&&v.d/v.t>=.8).map(([k])=>CATS[k].l);
  const bestDay=wd.map((d,i)=>{const dt=S.tasks.filter(t=>t.date===d);return{day:WK[i],pct:dt.length>0?dt.filter(t=>t.done).length/dt.length:0}}).sort((a,b)=>b.pct-a.pct)[0];
  if(bestDay?.pct>.5)patterns.push("Your best day was "+bestDay.day+".");
  const mornD=S.tasks.filter(t=>wd.includes(t.date)&&t.block==="morning"&&t.done).length;
  const mornT=S.tasks.filter(t=>wd.includes(t.date)&&t.block==="morning").length;
  if(mornT>=5&&mornD/mornT>.7)patterns.push("You're strongest in the mornings. Front-load important tasks there.");
  if(mornT>=5&&mornD/mornT<.3)patterns.push("Mornings are tough. Try shifting tasks to the afternoon.");

  if(struggling.length)p.append(h("div",{className:"card card-p"},
    h("div",{style:{fontSize:"11px",fontWeight:800,color:"var(--coral)",marginBottom:"3px"}},"FINDING THESE HARD"),
    h("div",{style:{fontSize:"13px",color:"var(--t2)",fontWeight:600}},struggling.join(", ")),
    h("div",{style:{fontSize:"11px",color:"var(--t3)",marginTop:"4px"}},"Try fewer tasks or smaller steps next week.")
  ));
  if(strong.length)p.append(h("div",{className:"card card-p"},
    h("div",{style:{fontSize:"11px",fontWeight:800,color:"var(--green)",marginBottom:"3px"}},"STRENGTHS"),
    h("div",{style:{fontSize:"13px",color:"var(--t2)",fontWeight:600}},strong.join(", "))
  ));
  if(patterns.length)p.append(h("div",{className:"card card-p"},
    h("div",{style:{fontSize:"11px",fontWeight:800,color:"var(--t3)",letterSpacing:".5px",marginBottom:"3px"}},"PATTERNS"),
    h("div",{style:{fontSize:"13px",color:"var(--t2)",fontWeight:600,lineHeight:"1.6"}},patterns.join(" "))
  ));

  page.append(p);
}

boot();render();
</script>
</body>
</html>
