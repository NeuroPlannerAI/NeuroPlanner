<style>

body{display:flex;flex-direction:column;padding-top:env(safe-area-inset-top)}
#root{display:flex;flex-direction:column;flex:1;overflow:hidden}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:16px}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--t1)}
input::placeholder,textarea::placeholder{color:var(--t3)}
::-webkit-scrollbar{width:0;display:none}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;

const ls=(k,d)=>{try{const v=localStorage.getItem("bd8_"+k);return v?JSON.parse(v):d}catch{return d}};
const ss=(k,v)=>{try{localStorage.setItem("bd8_"+k,JSON.stringify(v))}catch{}};
const TD=()=>new Date().toISOString().split("T")[0];
const WK=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const fD=s=>new Date(s+"T12:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});
const fS=s=>new Date(s+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
const fM=m=>m>=60?Math.floor(m/60)+"h"+(m%60?" "+m%60+"m":""):m+"m";
const uid=()=>Date.now()+Math.random();
const wkD=r=>{const d=new Date(r+"T12:00:00"),dy=d.getDay(),df=d.getDate()-dy+(dy===0?-6:1),m=new Date(d);m.setDate(df);return Array.from({length:7},(_,i)=>{const x=new Date(m);x.setDate(m.getDate()+i);return x.toISOString().split("T")[0]})};

const TH={
dark:{bg:"#1C1B22",bg2:"#26252E",card:"#2E2D38",bdr:"#3D3C4A",bdr2:"#4E4D60",t1:"#EEEDF5",t2:"#C0BED0",t3:"#8886A0",t4:"#5A5870",accent:"#C4A864",green:"#78B898",amber:"#C4A864",coral:"#C48878",teal:"#68A8A4",lilac:"#9888B8"},
light:{bg:"#F5F3F0",bg2:"#EAE7E2",card:"#FFFFFF",bdr:"#DDD8D0",bdr2:"#CCC6BC",t1:"#2A2520",t2:"#605848",t3:"#908878",t4:"#B8B0A4",accent:"#A08840",green:"#5A9A78",amber:"#A08840",coral:"#B07868",teal:"#4A8A88",lilac:"#7868A0"}
};
const CC={hygiene:"#C898B0",household:"#68A8A0",bean:"#B89860",creative:"#9080B8",exercise:"#68A888",reminders:"#B8A050",selfcare:"#B88080"};
const BLK=[{key:"morning",label:"Morning",cap:180,color:"#C4A864"},{key:"afternoon",label:"Afternoon",cap:240,color:"#7898C0"},{key:"evening",label:"Evening",cap:180,color:"#9888B8"},{key:"anytime",label:"Anytime",cap:999,color:"#68A8A4"}];

const CAT={
hygiene:{l:"Pamper + Hygiene",t:[["Fake tan",40],["Hair wash day",30],["Do my nails",30],["Full skincare routine",25],["Relax bath",45],["Everything shower",60],["Face mask",25],["Shave legs",15],["Deep condition hair",30],["Exfoliate",10],["Eyebrow tidy",10],["Moisturise properly",10],["Dry brush",10],["Lip scrub + balm",5]],x:[["Hair oil treatment",25],["Foot soak + scrub",30],["Gua sha session",20],["Clean makeup brushes",20],["Scalp massage",10],["Sheet mask",25],["Body butter",10],["Organise skincare shelf",15]]},
household:{l:"Sort The House",t:[["Change bedding",20],["Wash the floors",30],["Hoover upstairs",15],["Hoover downstairs",15],["Put a wash on",5],["Hang washing up",10],["Weekly food shop",60],["Clean bathroom",30],["Wipe kitchen sides",10],["Empty all bins",10],["Tidy living room",15],["Sort the fridge",15],["Ironing pile",30],["Dust surfaces",15],["Descale kettle",10]],x:[["Clean windows",25],["Organise under sink",20],["Deep clean microwave",15],["Wipe door handles",10],["Sort recycling",10],["Tidy junk drawer",15],["Wash kitchen towels",10],["Defrost freezer",45]]},
bean:{l:"Bean",t:[["Walk Bean (15 min)",20],["Walk Bean (30 min)",35],["Walk Bean (45 min)",50],["Walk Bean (1 hour)",65],["Bath Bean",45],["Wash Beans toys",20],["Wash Beans blankets",15],["Meal prep for Bean",30],["Brush Bean",15],["Trim Beans nails",10],["Clean Beans bowls",5],["Refill treat jar",5]],x:[["Training session (10 min)",15],["Enrichment toy time",15],["Clean Beans bed",20],["Worm/flea treatment",5],["New walk route",50],["Dental chew",5],["Paw wash",10]]},
creative:{l:"Creative (phone down)",t:[["Draw or doodle (20 min)",25],["Journal / brain dump",15],["Try a new recipe",45],["Rearrange a room",30],["DIY project",45],["Write a letter",20],["Colouring book",25],["Read for 30 mins",30],["Knit or crochet",30],["Try calligraphy",25],["Redecorate a shelf",15]],x:[["Collage from magazines",30],["Bake from scratch",50],["Sketch window view",25],["Make homemade cards",25],["Watercolour painting",30],["Press flowers",15]]},
exercise:{l:"Move Your Body",t:[["30 min walk with podcast",35],["Yoga session",30],["10 min stretch",10],["Dance around the house",15],["Pilates video",25],["Go for a run",35],["Skipping rope (10 min)",12],["HIIT (15 min)",20],["Ab workout",15],["Stairs x10",10],["YouTube workout",25]],x:[["Swim at local pool",50],["Park workout",30],["Gentle walk",20],["Resistance bands",20],["Foam roller",15],["Gardening",30]]},
reminders:{l:"Life Admin",t:[["Order meds",10],["Finance spreadsheet",30],["Check bills are paid",10],["Book GP appointment",10],["Therapy session",60],["Check bank balance",5],["Reply to that message",5],["Book dentist",5],["Renew prescription",10],["Check direct debits",10],["File paperwork",15]],x:[["Cancel unused subscriptions",10],["Check credit score",5],["Update CV",30],["That thing you keep avoiding",20],["Back up phone photos",15],["Unsubscribe from junk emails",15]]},
selfcare:{l:"Looking After You",t:[["Take your meds",2],["Drink 2L water",1],["No phone for 1 hour",60],["Bed before 11pm",1],["Call someone you love",15],["Read 10 pages",15],["Gratitude list (3 things)",5],["Fresh air (15 min)",15],["Make your bed",3],["Eat a proper meal",20]],x:[["Noise cancelling break",15],["Weighted blanket (20 min)",20],["Stimming break",10],["Sensory reset",15],["Pomodoro: 25/5",30],["Low demand hour",60]]}
};

const KW={hygiene:["tan","hair","nails","skin","bath","shower","face","moistur","shav","brow","lip","scrub","mask"],household:["hoover","vacuum","clean","dust","iron","floor","bin","fridge","kitchen","oven","window","tidy","shop","cook","laundry","wipe","descale","bedding"],bean:["bean","dog","pet","paw","treat","bowl","toy","blanket"],creative:["draw","paint","journal","write","read","knit","crochet","colour","craft","diy","bake","collage","letter"],exercise:["walk","run","yoga","stretch","dance","pilates","gym","swim","hiit","workout","skip","stairs"],reminders:["book","appointment","dentist","doctor","gp","therapy","meds","order","bill","bank","finance","prescription"],selfcare:["water","sleep","bed","phone","screen","grateful","meal","eat","rest","break","sensory"]};
const gCat=t=>{const l=t.toLowerCase();if(l.includes("bean"))return"bean";let b="selfcare",s=0;for(const[c,ws]of Object.entries(KW)){const n=ws.filter(w=>l.includes(w)).length;if(n>s){s=n;b=c}}return b};

const MODES=[
{k:"chill",l:"Chill Day",d:"Light and easy.",cats:["selfcare","bean","creative"],max:120},
{k:"pamper",l:"Pamper Day",d:"Full reset. Skin, hair, nails.",cats:["hygiene","selfcare"],max:180},
{k:"chores",l:"Chores Blitz",d:"Sort the house top to bottom.",cats:["household","selfcare","bean"],max:240},
{k:"work",l:"Work Day",d:"Minimal. Morning + evening.",cats:["selfcare","bean","reminders"],max:90},
{k:"catchup",l:"Catch-Up Day",d:"Life admin you keep avoiding.",cats:["reminders","household","selfcare"],max:180},
{k:"active",l:"Active Day",d:"Move, walk Bean, get outside.",cats:["exercise","bean","selfcare"],max:150},
{k:"creative",l:"Creative Day",d:"Phone down. Make something.",cats:["creative","selfcare"],max:180},
{k:"custom",l:"Build My Own",d:"Pick from everything.",cats:Object.keys(CAT),max:300}
];
const ENG=[{v:3,l:"High energy",d:"Bring it on",c:"#78B898"},{v:2,l:"Medium",d:"Steady pace",c:"#C4A864"},{v:1,l:"Low battery",d:"Gentle day",c:"#C48878"}];
const MDS=[{v:5,l:"Great",c:"#78B898"},{v:4,l:"Good",c:"#68A8A4"},{v:3,l:"Okay",c:"#C4A864"},{v:2,l:"Low",c:"#7898C0"},{v:1,l:"Rough",c:"#C48878"}];
const AMSG=["Added!","On the list!","Locked in!","Sorted!","Got it!"];
const DMSG=["Done!","Smashed it.","Ticked off.","Boom.","Sorted."];
const TIPS=["Put the phone in another room for 30 mins.","Set a 25 min timer. Do one task.","Open a book. Even 3 pages.","Text someone you haven't spoken to in a while.","Make a cup of tea. No screen.","Go stand outside for 5 minutes.","Pick up 5 things that are out of place."];
const RDEF=[{text:"Take your meds",cat:"selfcare",block:"morning",days:[0,1,2,3,4,5,6],id:1,mins:2},{text:"Walk Bean (30 min)",cat:"bean",block:"morning",days:[0,1,2,3,4,5,6],id:2,mins:35},{text:"Drink 2L water",cat:"selfcare",block:"anytime",days:[0,1,2,3,4,5,6],id:3,mins:1},{text:"Make your bed",cat:"selfcare",block:"morning",days:[0,1,2,3,4,5,6],id:4,mins:3}];

function calcStreaks(tasks){const track=["Take your meds","Walk Bean","Drink 2L water","Make your bed"];const st={};track.forEach(task=>{let c=0;const pfx=task.split(" ").slice(0,2).join(" ");for(let i=0;i<30;i++){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split("T")[0];if(tasks.some(t=>t.date===ds&&t.text.startsWith(pfx)&&t.done))c++;else if(i>0)break}st[task]=c});return st}
function reqNotif(){if("Notification"in window&&Notification.permission==="default")Notification.requestPermission()}
function sendNotif(title,body){if("Notification"in window&&Notification.permission==="granted")new Notification(title,{body})}
function exportICS(tasks,date){const hrs={morning:[8,0],afternoon:[12,0],evening:[17,0],anytime:[9,0]};let ics="BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//BrainDump//EN\n";tasks.filter(t=>t.date===date).forEach(t=>{const[sh]=hrs[t.block]||[9,0];const ds=date.replace(/-/g,"");const em=sh*60+(t.mins||15);ics+="BEGIN:VEVENT\nDTSTART:"+ds+"T"+String(sh).padStart(2,"0")+"0000\nDTEND:"+ds+"T"+String(Math.floor(em/60)).padStart(2,"0")+String(em%60).padStart(2,"0")+"00\nSUMMARY:"+t.text+"\nEND:VEVENT\n"});ics+="END:VCALENDAR";const b=new Blob([ics],{type:"text/calendar"}),u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download="brain-dump-"+date+".ics";a.click();URL.revokeObjectURL(u)}

// Components
function Toast({msg,color}){if(!msg)return null;return <div style={{position:"fixed",top:24,left:"50%",transform:"translateX(-50%)",padding:"12px 24px",borderRadius:16,fontWeight:800,fontSize:14,zIndex:2000,color:"#fff",background:color,boxShadow:"0 4px 20px rgba(0,0,0,.3)",pointerEvents:"none"}}>{msg}</div>}

function BlockPicker({text,mins,tasks,date,onAdd,onClose,T}){
const dayT=tasks.filter(t=>t.date===date);
return <div style={{position:"fixed",inset:0,zIndex:900,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
<div onClick={onClose} style={{flex:1,background:"rgba(0,0,0,.4)"}}/>
<div style={{background:T.card,borderRadius:"24px 24px 0 0",padding:"20px 16px calc(20px + env(safe-area-inset-bottom))",maxHeight:"70dvh",overflowY:"auto"}}>
<div style={{fontSize:16,fontWeight:800,color:T.t1,marginBottom:2}}>When?</div>
<div style={{fontSize:13,color:T.t2,marginBottom:16}}>{text} ({fM(mins)})</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
{BLK.map(b=>{const used=dayT.filter(t=>t.block===b.key&&!t.done).reduce((s,t)=>s+(t.mins||15),0);const pct=b.cap<999?Math.min(100,Math.round(((used+mins)/b.cap)*100)):0;const full=b.cap<999&&(used+mins)>b.cap;
return <button key={b.key} onClick={()=>onAdd(b.key)} style={{padding:16,background:T.bg2,border:"2px solid "+(full?T.coral:b.color),borderRadius:14,textAlign:"left",opacity:full?.5:1}}>
<div style={{fontSize:15,fontWeight:800,color:b.color,marginBottom:4}}>{b.label}</div>
{b.cap<999?<><div style={{height:6,background:T.bg,borderRadius:3,overflow:"hidden",marginBottom:3}}><div style={{height:"100%",width:pct+"%",background:full?T.coral:b.color,borderRadius:3}}/></div><div style={{fontSize:11,color:full?T.coral:T.t3,fontWeight:700}}>{fM(used)}/{fM(b.cap)}{full?" (full!)":""}</div></>:<div style={{fontSize:11,color:T.t3}}>No time limit</div>}
</button>})}
</div>
<button onClick={onClose} style={{width:"100%",marginTop:14,padding:14,background:T.bg,borderRadius:12,color:T.t3,fontWeight:700,fontSize:14}}>Cancel</button>
</div></div>
}

function CatPanel({catKey,tasks,date,onAdd,rec,T}){
const[open,setOpen]=useState(false);const[pool,setPool]=useState(null);
const cat=CAT[catKey],items=pool||cat.t,cc=CC[catKey];
const added=new Set(tasks.filter(t=>t.date===date).map(t=>t.text));
return <div style={{background:T.card,borderRadius:16,boxShadow:"var(--sh)",marginBottom:8,borderLeft:rec?"3px solid "+cc:"none"}}>
<button onClick={()=>setOpen(!open)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"14px 16px",textAlign:"left",color:T.t1}}>
<span style={{width:4,height:20,borderRadius:2,background:cc,flexShrink:0}}/>
<span style={{flex:1,fontSize:15,fontWeight:800}}>{cat.l}</span>
{rec&&<span style={{fontSize:10,fontWeight:700,color:T.accent,background:T.accent+"18",padding:"2px 8px",borderRadius:6}}>Suggested</span>}
<span style={{fontSize:12,color:T.t3}}>{items.length}</span>
<span style={{fontSize:14,color:T.t4,transform:open?"rotate(180deg)":"",transition:"transform .2s",display:"inline-block"}}>v</span>
</button>
{open&&<div style={{padding:"0 14px 14px"}}>
<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
{items.map(([task,mins])=>{const isA=added.has(task);return <button key={task} onClick={()=>!isA&&onAdd(task,catKey,mins)} style={{borderRadius:10,padding:"10px 14px",fontSize:14,fontWeight:600,border:"1.5px solid "+(isA?T.green+"60":T.bdr),background:isA?T.green+"10":T.card,color:isA?T.green:T.t1,opacity:isA?.5:1,display:"inline-flex",alignItems:"center",gap:4}}>
{isA&&"V "}{task}{!isA&&<span style={{fontSize:11,color:T.t3}}>{fM(mins)}</span>}
</button>})}
</div>
<button onClick={()=>{setPool([...cat.x].sort(()=>Math.random()-.5).slice(0,8))}} style={{padding:"8px 14px",border:"1.5px dashed "+T.bdr2,borderRadius:10,color:T.t3,fontSize:12,fontWeight:700}}>Refresh ideas</button>
</div>}
</div>
}

function TaskBlock({task,onToggle,onDelete,onFocus,T}){
const cc=CC[task.cat]||CC.selfcare;
return <div style={{display:"flex",alignItems:"stretch",borderRadius:14,background:T.card,boxShadow:"var(--sh)",marginBottom:6,opacity:task.done?.4:1}}>
<div style={{width:5,background:cc,flexShrink:0,borderRadius:"14px 0 0 14px"}}/>
<div style={{flex:1,display:"flex",alignItems:"center",gap:12,padding:"12px 14px"}}>
<button onClick={()=>onToggle(task.id)} style={{width:32,height:32,borderRadius:10,border:"2.5px solid "+(task.done?T.green:T.t4),background:task.done?T.green:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:T.bg,fontWeight:900,flexShrink:0}}>{task.done?"V":""}</button>
<div style={{flex:1,minWidth:0}}>
<div style={{fontSize:15,fontWeight:600,color:task.done?T.t3:T.t1,textDecoration:task.done?"line-through":"none",lineHeight:1.3}}>{task.text}</div>
<div style={{fontSize:12,color:T.t2,fontWeight:600,marginTop:2}}>{fM(task.mins||15)}{task.rolledOver&&!task.done?" / carried over":""}</div>
</div>
<div style={{display:"flex",gap:4,alignItems:"center",flexShrink:0}}>
{!task.done&&(task.mins||15)>=10&&<button onClick={()=>onFocus(task)} style={{fontSize:11,fontWeight:800,color:T.green,background:T.green+"18",border:"1px solid "+T.green+"30",borderRadius:8,padding:"6px 10px"}}>Focus</button>}
<button onClick={()=>onDelete(task.id)} style={{color:T.t3,fontSize:22,padding:"4px 6px",lineHeight:1}}>x</button>
</div>
</div></div>
}

function TimerScreen({task,onDone,onStop,T}){
const[rem,setRem]=useState(Math.min(task.mins||25,60)*60);
useEffect(()=>{const iv=setInterval(()=>setRem(p=>{if(p<=1){clearInterval(iv);setTimeout(onDone,100);return 0}return p-1}),1000);return()=>clearInterval(iv)},[]);
const m=Math.floor(rem/60),s=rem%60;
return <div style={{position:"fixed",inset:0,background:T.bg,zIndex:1100,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:24,color:T.t1}}>
<div style={{fontSize:12,fontWeight:800,color:T.t3,letterSpacing:1}}>FOCUS MODE</div>
<div style={{height:16}}/>
<div style={{fontSize:18,fontWeight:700,color:T.t2,textAlign:"center",maxWidth:280}}>{task.text}</div>
<div style={{height:8}}/>
<div style={{fontSize:64,fontWeight:900,fontVariantNumeric:"tabular-nums"}}>{String(m).padStart(2,"0")}:{String(s).padStart(2,"0")}</div>
<div style={{fontSize:13,color:T.t3,fontWeight:600}}>Phone down. Just this one thing.</div>
<div style={{height:24}}/>
<div style={{display:"flex",gap:10}}>
<button onClick={onDone} style={{padding:"14px 28px",background:T.green,borderRadius:14,color:"#fff",fontWeight:800,fontSize:15}}>Done early</button>
<button onClick={onStop} style={{padding:"14px 28px",background:T.bg2,borderRadius:14,color:T.t2,fontWeight:700,fontSize:15}}>Stop</button>
</div></div>
}

function AddRecSheet({onAdd,onClose,T}){
const[text,setText]=useState("");const[block,setBlock]=useState("morning");const[days,setDays]=useState([0,1,2,3,4,5,6]);const[mins,setMins]=useState(15);
return <div style={{position:"fixed",inset:0,zIndex:900,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
<div onClick={onClose} style={{flex:1,background:"rgba(0,0,0,.4)"}}/>
<div style={{background:T.card,borderRadius:"24px 24px 0 0",padding:"20px 16px calc(20px + env(safe-area-inset-bottom))",maxHeight:"80dvh",overflowY:"auto"}}>
<div style={{fontSize:16,fontWeight:800,color:T.t1,marginBottom:12}}>New Auto Reminder</div>
<input value={text} onChange={e=>setText(e.target.value)} placeholder="Task name..." style={{width:"100%",background:T.bg2,border:"1px solid "+T.bdr,borderRadius:10,padding:10,outline:"none",fontSize:14,marginBottom:8}}/>
<div style={{fontSize:12,fontWeight:700,color:T.t3,marginBottom:4}}>Duration</div>
<div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}}>{[5,10,15,30,45,60].map(m=><button key={m} onClick={()=>setMins(m)} style={{padding:"6px 10px",borderRadius:8,fontSize:12,fontWeight:700,background:mins===m?T.accent:T.bg2,color:mins===m?"#fff":T.t2,border:"1px solid "+T.bdr}}>{m}m</button>)}</div>
<div style={{fontSize:12,fontWeight:700,color:T.t3,marginBottom:4}}>Time block</div>
<div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}}>{BLK.map(b=><button key={b.key} onClick={()=>setBlock(b.key)} style={{padding:"6px 10px",borderRadius:8,fontSize:12,fontWeight:700,background:block===b.key?b.color:T.bg2,color:block===b.key?"#fff":T.t2,border:"1px solid "+T.bdr}}>{b.label}</button>)}</div>

<div style={secH}>DAILY BUDGET</div>
{(()=>{const budget=spending.budget||20;const todayI=(spending.items||[]).filter(i=>i.date===TD());const spent=todayI.reduce((s,i)=>s+i.amount,0);const left=budget-spent;return <>
<div style={{fontSize:36,fontWeight:900,color:left<0?T.coral:left<5?T.amber:T.green,marginBottom:4}}>{"\u00a3"}{left.toFixed(2)}</div>
<div style={{fontSize:12,color:T.t2,fontWeight:600,marginBottom:6}}>of {"\u00a3"}{budget} today</div>
<div style={{display:"flex",gap:6,alignItems:"center",marginBottom:10}}><span style={{fontSize:12,fontWeight:700,color:T.t3}}>Limit:</span><input type="number" value={spending.budget||20} onChange={e=>setSpending(p=>({...p,budget:parseFloat(e.target.value)||0}))} style={{width:55,background:T.bg2,border:"1px solid "+T.bdr,borderRadius:8,padding:"6px 8px",outline:"none",fontWeight:700,textAlign:"center",fontSize:14}}/></div>
<div style={{display:"flex",gap:6,marginBottom:10}}>
<input value={spendDesc} onChange={e=>setSpendDesc(e.target.value)} placeholder="What for?" style={{flex:1,background:T.bg2,border:"1px solid "+T.bdr,borderRadius:10,padding:10,outline:"none",fontSize:14}}/>
<input value={spendAmt} onChange={e=>setSpendAmt(e.target.value)} type="number" step="0.01" placeholder={"\u00a3"} style={{width:65,background:T.bg2,border:"1px solid "+T.bdr,borderRadius:10,padding:10,outline:"none",fontSize:14}}/>
<button onClick={()=>{const a=parseFloat(spendAmt);if(isNaN(a)||a<=0)return;setSpending(p=>({...p,items:[...(p.items||[]),{amount:a,desc:spendDesc||"Something",date:TD(),id:uid()}]}));toast("-\u00a3"+a.toFixed(2),T.coral);setSpendDesc("");setSpendAmt("")}} style={{background:T.amber,borderRadius:10,padding:"10px 14px",color:"#fff",fontWeight:800,fontSize:16}}>+</button>
</div>
{todayI.map(item=><div key={item.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+T.bdr}}><span style={{fontSize:14,color:T.t2,fontWeight:600}}>{item.desc}</span><span style={{fontSize:14,fontWeight:700,color:T.coral}}>-{"\u00a3"}{item.amount.toFixed(2)}</span></div>)}
</>})()}
</div>
<div style={card}><div style={secH}>STREAKS</div>
{Object.entries(streaks).map(([name,count])=><div key={name} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid "+T.bdr}}><span style={{fontSize:14,fontWeight:600}}>{name}</span><span style={{fontSize:15,fontWeight:900,color:count>0?T.green:T.t4}}>{count>0?count+" days":"--"}</span></div>)}
</div>
<div style={card}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={secH}>AUTO REMINDERS</div><button onClick={()=>setShowAddRec(true)} style={{fontSize:12,fontWeight:800,color:T.accent,padding:"4px 10px",background:T.accent+"12",borderRadius:8,border:"1px solid "+T.accent+"25"}}>+ Add</button></div>
{recurring.map(r=>{const bL=BLK.find(b=>b.key===r.block)?.label||"Anytime";return <div key={r.id||r.text} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 0",borderBottom:"1px solid "+T.bdr}}>
<span style={{width:4,height:16,borderRadius:2,background:CC[r.cat]||CC.selfcare,flexShrink:0}}/>
<div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{r.text}</div><div style={{fontSize:11,color:T.t2}}>{bL} / {r.days.map(d=>WK[d]).join(", ")} / {fM(r.mins||15)}</div></div>
<button onClick={()=>setRecurring(p=>p.filter(x=>(x.id||x.text)!==(r.id||r.text)))} style={{color:T.t3,fontSize:18,padding:4}}>x</button>
</div>})}
</div>
<div style={card}><div style={secH}>DOOM SCROLL ALTERNATIVE</div><div style={{fontSize:13,color:T.t1,fontWeight:600,lineHeight:1.6}}>{TIPS[Math.floor(Math.random()*TIPS.length)]}</div></div>
</>}

{tab==="insights"&&(()=>{
const wd=wkD(date);const cs={};Object.keys(CAT).forEach(k=>cs[k]={t:0,d:0});let tA=0,dA=0;
wd.forEach(dt=>tasks.filter(t=>t.date===dt).forEach(t=>{const c=t.cat||"selfcare";if(cs[c]){cs[c].t++;if(t.done)cs[c].d++}tA++;if(t.done)dA++}));
const wp=tA>0?Math.round(dA/tA*100):0;
const wm=wd.map(d=>moods[d]).filter(Boolean);const avgM=wm.length?wm.reduce((s,m)=>s+m,0)/wm.length:null;
const struggling=Object.entries(cs).filter(([,v])=>v.t>=3&&v.d/v.t<.4).map(([k])=>CAT[k].l);
const strong=Object.entries(cs).filter(([,v])=>v.t>=2&&v.d/v.t>=.8).map(([k])=>CAT[k].l);
return <>
<div style={{fontSize:22,fontWeight:900,marginBottom:14}}>This Week</div>
<div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5,marginBottom:16}}>
{wd.map((dt,i)=>{const dts=tasks.filter(t=>t.date===dt),dn2=dts.filter(t=>t.done).length,tot=dts.length;const isSel=dt===date,pc=tot>0?Math.round(dn2/tot*100):0;return <button key={dt} onClick={()=>{setDate(dt);setTab("today")}} style={{background:isSel?T.accent+"15":T.card,border:"1.5px solid "+(isSel?T.accent+"40":T.bdr),borderRadius:10,padding:"8px 2px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:T.t1}}>
<span style={{fontSize:10,fontWeight:800,color:isSel?T.accent:T.t3}}>{WK[i]}</span>
<span style={{fontSize:17,fontWeight:900,color:isSel?T.t1:T.t2}}>{new Date(dt+"T12:00:00").getDate()}</span>
{tot>0?<span style={{fontSize:10,fontWeight:700,color:pc===100?T.green:T.t3}}>{dn2}/{tot}</span>:<span style={{fontSize:10,color:T.t4}}>-</span>}
{moods[dt]&&<span style={{width:6,height:6,borderRadius:"50%",background:MDS.find(m=>m.v===moods[dt])?.c||T.t4}}/>}
</button>})}
</div>
<div style={{...card,textAlign:"center"}}><div style={{fontSize:48,fontWeight:900,color:wp>=70?T.green:wp>=40?T.amber:T.coral}}>{wp}%</div><div style={{fontSize:13,color:T.t2,fontWeight:600}}>{dA} of {tA} tasks this week</div></div>
{avgM!==null&&<div style={{...card,textAlign:"center"}}><div style={{fontSize:11,fontWeight:700,color:T.t3}}>Average mood</div><div style={{fontSize:22,fontWeight:900,color:MDS.find(m=>m.v===Math.round(avgM))?.c||T.t2}}>{MDS.find(m=>m.v===Math.round(avgM))?.l||"?"}</div></div>}
<div style={card}><div style={secH}>BY CATEGORY</div>
{Object.entries(cs).filter(([,v])=>v.t>0).length===0?<div style={{fontSize:13,color:T.t3}}>No tasks this week yet</div>:
Object.entries(cs).filter(([,v])=>v.t>0).map(([k,v])=>{const pc=Math.round(v.d/v.t*100);return <div key={k} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
<span style={{width:4,height:16,borderRadius:2,background:CC[k],flexShrink:0}}/><span style={{fontSize:12,fontWeight:700,color:T.t1,width:110}}>{CAT[k].l}</span>
<div style={{flex:1,height:6,background:T.bg2,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:pc+"%",background:CC[k],borderRadius:3}}/></div>
<span style={{fontSize:11,fontWeight:800,color:CC[k],width:36,textAlign:"right"}}>{v.d}/{v.t}</span></div>})}
</div>
{struggling.length>0&&<div style={card}><div style={{...secH,color:T.coral}}>FINDING THESE HARD</div><div style={{fontSize:13,color:T.t1,fontWeight:600}}>{struggling.join(", ")}</div><div style={{fontSize:11,color:T.t3,marginTop:4}}>Try fewer tasks or smaller steps.</div></div>}
{strong.length>0&&<div style={card}><div style={{...secH,color:T.green}}>STRENGTHS</div><div style={{fontSize:13,color:T.t1,fontWeight:600}}>{strong.join(", ")}</div></div>}
</>;
})()}

</div></div>

<div style={{display:"flex",background:T.card,borderTop:"1px solid "+T.bdr,padding:"4px 6px calc(4px + env(safe-area-inset-bottom))",gap:2,flexShrink:0}}>
{[{id:"plan",l:"Plan",ic:"+"},{id:"pick",l:"Tasks",ic:"#"},{id:"today",l:"My Day",ic:"o"},{id:"life",l:"Life",ic:"*"},{id:"insights",l:"Insights",ic:"~"}].map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"8px 0",borderRadius:12,fontSize:10,fontWeight:700,color:tab===t.id?T.accent:T.t3,background:tab===t.id?T.accent+"12":"transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
<span style={{fontSize:16,lineHeight:1}}>{t.ic}</span>{t.l}
</button>)}
</div>
</div>;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
