<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F0F13">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.svg">
<title>Brain Dump</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F0F13;--card:#181820;--border:#252530;--border2:#2E2E3A;--t1:#EEEEF0;--t2:#AAAAB8;--t3:#66667A;--accent:#D4A0C0;--green:#7EC8A0;--amber:#D4B870;--coral:#D49090;--teal:#70B8B0;--lilac:#B0A0D4;--warm:#D4A874;--blue:#90A8D4}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--t1);font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;height:100dvh;overscroll-behavior:none;overflow:hidden}
body{display:flex;flex-direction:column;padding-top:env(safe-area-inset-top)}
body.calm{--accent:#999;--green:#8BA;--amber:#AA9;--coral:#A88;--teal:#8AA;--lilac:#99A;--warm:#A98}
body.calm *{animation-duration:0s!important;transition-duration:.05s!important}
button{cursor:pointer;transition:all .12s;border:none;background:none;font-family:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
input::placeholder{color:var(--t3)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);padding:12px 24px;border-radius:14px;font-weight:800;font-size:14px;z-index:2000;opacity:0;transition:all .3s cubic-bezier(.22,1,.36,1);pointer-events:none;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pad{max-width:520px;margin:0 auto;padding:16px 14px 24px}

.tab-bar{display:flex;background:#131318;border-top:1px solid var(--border);padding:6px 8px calc(6px + env(safe-area-inset-bottom));gap:4px;flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 0;border-radius:10px;color:var(--t3);font-size:9px;font-weight:800;letter-spacing:.5px}
.tab.on{color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,transparent)}
.tab-icon{font-size:16px;line-height:1}

.card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:8px}

.block-picker-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:899;opacity:0;pointer-events:none;transition:opacity .2s}
.block-picker-bg.show{opacity:1;pointer-events:auto}
.block-picker{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom));z-index:900;transform:translateY(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);box-shadow:0 -8px 40px rgba(0,0,0,.6)}
.block-picker.show{transform:translateY(0)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.modal-box{background:var(--card);border-radius:20px;max-width:500px;width:100%;max-height:85dvh;overflow:hidden;display:flex;flex-direction:column;border:1px solid var(--border)}
.modal-body{flex:1;overflow-y:auto;padding:14px 16px;-webkit-overflow-scrolling:touch}

.timer-overlay{position:fixed;inset:0;background:var(--bg);z-index:1100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px}

.fill-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.fill-inner{height:100%;border-radius:3px;transition:width .5s ease}

.wrap{display:flex;flex-wrap:wrap;gap:5px}
.tag{border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;border:1px solid var(--border2);background:color-mix(in srgb,var(--bg) 50%,var(--card));color:var(--t2)}
.tag:active{transform:scale(.96)}

.mode-card{border-radius:14px;padding:18px 14px;border:2px solid var(--border);text-align:left;transition:all .15s;background:var(--card)}
.mode-card:active{transform:scale(.97)}

@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="block-picker-bg" id="bpBg"></div>
<div class="block-picker" id="bp"></div>
<div class="page" id="page"></div>
<div class="tab-bar" id="tabs"></div>

<script>
const LS=(k,d)=>{try{const v=localStorage.getItem("bd_"+k);return v?JSON.parse(v):d}catch{return d}};
const SS=(k,v)=>{try{localStorage.setItem("bd_"+k,JSON.stringify(v))}catch{}};
const getToday=()=>new Date().toISOString().split("T")[0];
const WK=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const getWeekDates=r=>{const d=new Date(r+"T12:00:00"),dy=d.getDay(),df=d.getDate()-dy+(dy===0?-6:1),m=new Date(d);m.setDate(df);return Array.from({length:7},(_,i)=>{const x=new Date(m);x.setDate(m.getDate()+i);return x.toISOString().split("T")[0]})};
const fmtDate=s=>new Date(s+"T12:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});
const fmtShort=s=>new Date(s+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
const fmtMins=m=>m>=60?Math.floor(m/60)+"h "+(m%60>0?(m%60)+"m":""):m+"m";

const BLOCKS=[
  {key:"morning",label:"Morning",cap:180,color:"var(--amber)"},
  {key:"afternoon",label:"Afternoon",cap:240,color:"var(--accent)"},
  {key:"evening",label:"Evening",cap:180,color:"var(--lilac)"},
  {key:"anytime",label:"Anytime",cap:999,color:"var(--teal)"}
];

const CATS={
  hygiene:{label:"Pamper + Hygiene",icon:"✦",color:"var(--accent)",
    tasks:[["Fake tan",40],["Hair wash day",30],["Do my nails",30],["Full skincare routine",25],["Relax bath",45],["Everything shower",60],["Face mask",25],["Shave legs",15],["Deep condition hair",30],["Exfoliate",10],["Eyebrow tidy",10],["Moisturise properly",10],["Dry brush before shower",10],["Lip scrub + balm",5]],
    extras:[["Hair oil treatment",25],["Foot soak + scrub",30],["Gua sha session",20],["Clean makeup brushes",20],["Scalp massage",10],["Sheet mask evening",25],["Body butter after bath",10],["Trim split ends",10],["Organise skincare shelf",15],["Double cleanse properly",10]]},
  household:{label:"Sort The House",icon:"◈",color:"var(--teal)",
    tasks:[["Change bedding",20],["Wash the floors",30],["Hoover upstairs",15],["Hoover downstairs",15],["Put a wash on",5],["Hang washing up",10],["Weekly food shop",60],["Clean bathroom",30],["Wipe kitchen sides",10],["Empty all bins",10],["Tidy living room",15],["Sort the fridge",15],["Ironing pile",30],["Dust surfaces",15],["Descale kettle",10]],
    extras:[["Clean windows",25],["Organise under sink",20],["Deep clean microwave",15],["Wipe door handles",10],["Sort recycling",10],["Tidy junk drawer",15],["Wash kitchen towels",10],["Clean behind sofa",20],["Defrost freezer",45],["Wipe skirting boards",25]]},
  bean:{label:"Bean",icon:"♥",color:"var(--warm)",
    tasks:[["Walk Bean (15 min)",20],["Walk Bean (30 min)",35],["Walk Bean (45 min)",50],["Walk Bean (1 hour)",65],["Bath Bean",45],["Wash Bean's toys",20],["Wash Bean's blankets",15],["Meal prep for Bean",30],["Brush Bean",15],["Trim Bean's nails",10],["Clean Bean's bowls",5],["Refill treat jar",5]],
    extras:[["Training session (10 min)",15],["Enrichment toy time",15],["Clean Bean's bed",20],["Worm/flea treatment",5],["New walk route",50],["Dental chew",5],["Socialise Bean",30],["Paw wash after walk",10],["Check Bean's ears",5]]},
  creative:{label:"Creative (phone down)",icon:"◐",color:"var(--lilac)",
    tasks:[["Draw or doodle (20 min)",25],["Journal / brain dump",15],["Try a new recipe",45],["Rearrange a room",30],["DIY project",45],["Write a letter",20],["Colouring book",25],["Read for 30 mins",30],["Knit or crochet",30],["Try calligraphy",25],["Redecorate a shelf",15]],
    extras:[["Collage from magazines",30],["Bake from scratch",50],["Sketch window view",25],["Make homemade cards",25],["Try origami",15],["Watercolour painting",30],["Press flowers",15],["Macrame or bracelets",25]]},
  exercise:{label:"Move Your Body",icon:"△",color:"var(--green)",
    tasks:[["30 min walk with podcast",35],["Yoga session",30],["10 min stretch",10],["Dance around the house",15],["Pilates video",25],["Go for a run",35],["Skipping rope (10 min)",12],["HIIT workout (15 min)",20],["Ab workout",15],["Stairs x10",10],["YouTube workout",25]],
    extras:[["Swim at local pool",50],["Park workout",30],["Gentle walk",20],["Resistance bands",20],["Wall sits while kettle boils",5],["Foam roller session",15],["Gardening",30],["Cleaning as cardio",20]]},
  reminders:{label:"Life Admin",icon:"◇",color:"var(--amber)",
    tasks:[["Order meds",10],["Finance spreadsheet",30],["Check bills are paid",10],["Book GP appointment",10],["Therapy session",60],["Check bank balance",5],["Reply to that message",5],["Book dentist",5],["Renew prescription",10],["Check direct debits",10],["File paperwork",15]],
    extras:[["Cancel unused subscriptions",10],["Check credit score",5],["Update CV",30],["That thing you keep avoiding",20],["Back up phone photos",15],["Unsubscribe from junk emails",15],["Book eye test",5],["Check passport expiry",5]]},
  selfcare:{label:"Looking After You",icon:"○",color:"var(--coral)",
    tasks:[["Take your meds",2],["Drink 2L water",1],["No phone for 1 hour",60],["Bed before 11pm",1],["Call someone you love",15],["Read 10 pages",15],["Gratitude list (3 things)",5],["Fresh air (15 min)",15],["Make your bed",3],["Eat a proper meal",20]],
    extras:[["Noise cancelling headphones break",15],["Weighted blanket (20 min)",20],["Stimming break",10],["Sensory reset",15],["Pomodoro: 25 on / 5 off",30],["Low demand hour",60],["Cancel plans guilt-free",1]]}
};

const KW={hygiene:["tan","hair","nails","skin","bath","shower","face","moistur","shav","brow","lash","lip","scrub","mask"],household:["hoover","vacuum","clean","dust","iron","floor","bin","fridge","kitchen","oven","window","tidy","shop","cook","laundry","wipe","descale","bedding"],bean:["bean","dog","pet","paw","treat","bowl","toy","blanket"],creative:["draw","paint","journal","write","read","knit","crochet","colour","craft","diy","bake","collage","letter"],exercise:["walk","run","yoga","stretch","dance","pilates","gym","swim","hiit","workout","skip","stairs"],reminders:["book","appointment","dentist","doctor","gp","therapy","meds","order","bill","bank","finance","prescription"],selfcare:["water","sleep","bed","phone","screen","grateful","meal","eat","rest","break","sensory"]};
function guessCat(t){const l=t.toLowerCase();if(l.includes("bean"))return"bean";let b="selfcare",bs=0;for(const[c,ws]of Object.entries(KW)){const s=ws.filter(w=>l.includes(w)).length;if(s>bs){bs=s;b=c}}return b}

const DONE_MSG=["Done!","Smashed it.","Ticked off.","Another one down.","Boom.","Sorted.","On a roll.","Nice one.","Cleared."];
const ADD_MSG=["Added!","On the list!","Got it!","Locked in!","Sorted!","Planned!","Nice one!"];
const MOODS=[{v:5,l:"Great",c:"var(--green)"},{v:4,l:"Good",c:"var(--teal)"},{v:3,l:"Okay",c:"var(--amber)"},{v:2,l:"Low",c:"var(--accent)"},{v:1,l:"Rough",c:"var(--coral)"}];
const ENERGY=[{v:3,l:"High energy",c:"var(--green)",desc:"Bring it on"},{v:2,l:"Medium",c:"var(--amber)",desc:"Steady pace"},{v:1,l:"Low battery",c:"var(--coral)",desc:"Gentle day"}];

const DAY_MODES=[
  {key:"chill",label:"Chill Day",desc:"Light and easy. Bean, self care, maybe one chore.",icon:"○",color:"var(--teal)",cats:["selfcare","bean","creative"],maxMins:120},
  {key:"pamper",label:"Pamper Day",desc:"Skin, hair, nails, bath. Full reset.",icon:"✦",color:"var(--accent)",cats:["hygiene","selfcare"],maxMins:180},
  {key:"chores",label:"Chores Blitz",desc:"Sort the house, top to bottom.",icon:"◈",color:"var(--teal)",cats:["household","selfcare","bean"],maxMins:240},
  {key:"work",label:"Work Day",desc:"Minimal tasks. Morning + evening only.",icon:"◇",color:"var(--amber)",cats:["selfcare","bean","reminders"],maxMins:90},
  {key:"catchup",label:"Catch-Up Day",desc:"Life admin, errands, the stuff you keep avoiding.",icon:"◇",color:"var(--lilac)",cats:["reminders","household","selfcare"],maxMins:180},
  {key:"active",label:"Active Day",desc:"Move your body, walk Bean, get outside.",icon:"△",color:"var(--green)",cats:["exercise","bean","selfcare"],maxMins:150},
  {key:"creative",label:"Creative Day",desc:"Phone down. Make something. Reset your brain.",icon:"◐",color:"var(--lilac)",cats:["creative","selfcare"],maxMins:180},
  {key:"custom",label:"Build My Own",desc:"Pick and choose from everything.",icon:"◉",color:"var(--t2)",cats:Object.keys(CATS),maxMins:300}
];

const REC_DEF=[
  {text:"Take your meds",category:"selfcare",block:"morning",days:[0,1,2,3,4,5,6],id:1,mins:2},
  {text:"Walk Bean (30 min)",category:"bean",block:"morning",days:[0,1,2,3,4,5,6],id:2,mins:35},
  {text:"Drink 2L water",category:"selfcare",block:"anytime",days:[0,1,2,3,4,5,6],id:3,mins:1},
  {text:"Make your bed",category:"selfcare",block:"morning",days:[0,1,2,3,4,5,6],id:4,mins:3}
];

const SHOP={Essentials:["Bread","Milk","Eggs","Butter","Cheese","Chicken","Mince","Rice","Pasta","Tinned tomatoes","Onions","Potatoes","Bananas","Apples"],Snacks:["Crisps","Biscuits","Chocolate","Popcorn","Cereal bars","Fruit","Yoghurts","Nuts"],Freezer:["Frozen pizza","Chips","Ice cream","Frozen veg","Fish fingers","Garlic bread","Waffles"],"Household bits":["Washing up liquid","Loo roll","Bin bags","Kitchen roll","Laundry tabs","Surface spray","Dishwasher tabs"],"ADHD friendly":["Pre-chopped veg","Microwave rice pouches","Ready meals for bad days","Meal deal bits","Batch cook ingredients","Protein bars","Frozen fruit for smoothies"]};

// ── STATE ──
let S={
  tasks:LS("tasks",[]),selDate:getToday(),tab:"plan",
  spending:LS("spending",{budget:20,items:[]}),
  moods:LS("moods",{}),checkins:LS("checkins",{}),
  energy:LS("energy",{}),dayModes:LS("dayModes",{}),
  recurring:LS("recurring",REC_DEF),rolled:LS("rolled",""),
  streaks:LS("streaks",{}),calm:LS("calm",false),
  openCats:{},catPools:{},focusTask:null
};
const save=()=>{SS("tasks",S.tasks);SS("spending",S.spending);SS("moods",S.moods);SS("checkins",S.checkins);SS("energy",S.energy);SS("dayModes",S.dayModes);SS("recurring",S.recurring);SS("rolled",S.rolled);SS("streaks",S.streaks);SS("calm",S.calm)};

function boot(){
  const today=getToday();if(S.rolled===today)return;
  const y=new Date();y.setDate(y.getDate()-1);const ys=y.toISOString().split("T")[0];
  const inc=S.tasks.filter(t=>t.date===ys&&!t.done);
  if(inc.length){const ids=new Set(inc.map(t=>t.id));S.tasks=S.tasks.filter(t=>!ids.has(t.id));inc.forEach(t=>S.tasks.push({...t,id:Date.now()+Math.random(),date:today,rolledOver:true}))}
  const dow=new Date().getDay(),adj=dow===0?6:dow-1;
  const have=new Set(S.tasks.filter(t=>t.date===today).map(t=>t.text));
  S.recurring.forEach(r=>{if(r.days.includes(adj)&&!have.has(r.text))S.tasks.push({id:Date.now()+Math.random()+Math.random(),text:r.text,done:false,category:r.category,date:today,rolledOver:false,block:r.block||"morning",mins:r.mins||15})});
  // Update streaks
  updateStreaks();
  S.rolled=today;save();
}

function updateStreaks(){
  const trackable=["Take your meds","Walk Bean","Drink 2L water","Make your bed"];
  trackable.forEach(task=>{
    let count=0;
    for(let i=0;i<30;i++){
      const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split("T")[0];
      const found=S.tasks.find(t=>t.date===ds&&t.text.includes(task.split(" ")[0])&&t.done);
      if(found)count++;else if(i>0)break;
    }
    S.streaks[task]=count;
  });
}

function h(tag,a,...ch){const el=document.createElement(tag);if(a)for(const[k,v]of Object.entries(a)){if(k==="style"&&typeof v==="object")Object.assign(el.style,v);else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="className")el.className=v;else el.setAttribute(k,v)}ch.flat(9).forEach(c=>{if(c!=null)el.append(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c)});return el}

function toast(msg,color){const t=document.getElementById("toast");t.textContent=msg;t.style.background=color||"var(--green)";t.style.color="#0F0F13";t.classList.add("show");clearTimeout(t._tm);t._tm=setTimeout(()=>t.classList.remove("show"),1800)}

function showBlockPicker(text,cat,mins){
  const bg=document.getElementById("bpBg"),bp=document.getElementById("bp");
  bp.innerHTML="";
  bp.append(h("div",{style:{fontSize:"15px",fontWeight:800,color:"var(--t1)",marginBottom:"2px"}},"When?"));
  bp.append(h("div",{style:{fontSize:"12px",color:"var(--t3)",fontWeight:600,marginBottom:"4px"}},text+" ("+fmtMins(mins)+")"));

  // Show capacity for each block
  const today=getToday(),dayTasks=S.tasks.filter(t=>t.date===today);
  const grid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginTop:"12px"}});
  BLOCKS.forEach(b=>{
    const used=dayTasks.filter(t=>t.block===b.key&&!t.done).reduce((s,t)=>s+(t.mins||15),0);
    const pct=b.cap<999?Math.min(100,Math.round(((used+mins)/b.cap)*100)):0;
    const full=b.cap<999&&(used+mins)>b.cap;
    grid.append(h("button",{style:{background:full?"rgba(212,144,144,.08)":"color-mix(in srgb,"+b.color+" 6%,var(--card))",border:"2px solid "+(full?"var(--coral)":b.color),borderRadius:"14px",padding:"14px 12px",textAlign:"left",opacity:full?.6:1},onClick:()=>{
      S.tasks.push({id:Date.now()+Math.random(),text,done:false,category:cat,date:S.selDate,rolledOver:false,block:b.key,mins});
      save();hideBlockPicker();toast(ADD_MSG[Math.floor(Math.random()*ADD_MSG.length)],b.color);render();
    }},
      h("div",{style:{fontSize:"14px",fontWeight:800,color:b.color}},b.label),
      b.cap<999?h("div",{style:{marginTop:"6px"}},
        h("div",{className:"fill-bar"},h("div",{className:"fill-inner",style:{width:Math.min(100,pct)+"%",background:full?"var(--coral)":b.color}})),
        h("div",{style:{fontSize:"10px",color:full?"var(--coral)":"var(--t3)",fontWeight:700,marginTop:"3px"}},fmtMins(used)+" / "+fmtMins(b.cap)+(full?" (a lot!)":""))
      ):h("div",{style:{fontSize:"10px",color:"var(--t3)",fontWeight:600,marginTop:"4px"}},"No time limit")
    ));
  });
  bp.append(grid);
  bp.append(h("button",{style:{width:"100%",marginTop:"14px",padding:"14px",background:"var(--border)",borderRadius:"12px",color:"var(--t3)",fontWeight:700,fontSize:"14px"},onClick:hideBlockPicker},"Cancel"));
  bg.classList.add("show");bp.classList.add("show");bg.onclick=hideBlockPicker;
}
function hideBlockPicker(){document.getElementById("bpBg").classList.remove("show");document.getElementById("bp").classList.remove("show")}

function addTask(text,cat,mins){if(!text.trim())return;showBlockPicker(text.trim(),cat||guessCat(text),mins||15)}
function toggleTask(id){const t=S.tasks.find(x=>x.id===id);if(!t)return;if(!t.done)toast(DONE_MSG[Math.floor(Math.random()*DONE_MSG.length)],"var(--green)");t.done=!t.done;updateStreaks();save();render()}
function deleteTask(id){S.tasks=S.tasks.filter(t=>t.id!==id);save();render()}

function generateDayPlan(modeKey,energyLevel){
  const mode=DAY_MODES.find(m=>m.key===modeKey);if(!mode)return;
  const today=S.selDate,existing=S.tasks.filter(t=>t.date===today);
  const existingTexts=new Set(existing.map(t=>t.text));
  const energyMult=energyLevel===3?1.2:energyLevel===1?0.6:1;
  const budget=Math.round(mode.maxMins*energyMult);
  let totalMins=existing.reduce((s,t)=>s+(t.mins||15),0);

  const pool=[];
  mode.cats.forEach(catKey=>{
    const cat=CATS[catKey];if(!cat)return;
    cat.tasks.forEach(([text,mins])=>{if(!existingTexts.has(text))pool.push({text,mins,cat:catKey})});
  });
  // Shuffle
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}

  const blockBudgets={morning:0,afternoon:0,evening:0,anytime:0};
  const blockCaps={morning:energyLevel===1?60:90,afternoon:modeKey==="work"?0:120,evening:90,anytime:60};
  if(modeKey==="work"){blockCaps.morning=45;blockCaps.afternoon=0;blockCaps.evening=60}

  pool.forEach(item=>{
    if(totalMins+item.mins>budget)return;
    // Pick best block
    let bestBlock="anytime";
    for(const b of["morning","afternoon","evening"]){
      if(blockBudgets[b]+item.mins<=blockCaps[b]){bestBlock=b;break}
    }
    if(bestBlock!=="anytime"||blockBudgets.anytime+item.mins<=blockCaps.anytime){
      S.tasks.push({id:Date.now()+Math.random()+Math.random(),text:item.text,done:false,category:item.cat,date:today,rolledOver:false,block:bestBlock,mins:item.mins});
      blockBudgets[bestBlock]+=item.mins;totalMins+=item.mins;
    }
  });
  S.dayModes[today]=modeKey;S.energy[today]=energyLevel;save();
}

function shareDay(){

// ── FOCUS TIMER ──
function startFocusTimer(task){
  S.focusTask=task;
  const overlay=h("div",{className:"timer-overlay"});
  const mins=Math.min(task.mins||25,60);
  let remaining=mins*60,running=true;

  const title=h("div",{style:{fontSize:"14px",fontWeight:700,color:"var(--t3)",letterSpacing:"1px",textTransform:"uppercase"}},"FOCUS MODE");
  const taskName=h("div",{style:{fontSize:"18px",fontWeight:800,color:"var(--t1)",textAlign:"center",maxWidth:"300px"}},task.text);
  const timeDisplay=h("div",{style:{fontSize:"72px",fontWeight:900,color:"var(--green)",fontVariantNumeric:"tabular-nums"}});
  const sub=h("div",{style:{fontSize:"13px",color:"var(--t3)",fontWeight:600}},"Phone down. Just this one thing.");

  const updateTime=()=>{const m=Math.floor(remaining/60),s=remaining%60;timeDisplay.textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")};
  updateTime();

  const interval=setInterval(()=>{
    if(!running)return;remaining--;updateTime();
    if(remaining<=0){clearInterval(interval);toast("Timer done! Task complete.","var(--green)");toggleTask(task.id);overlay.remove();S.focusTask=null}
  },1000);

  const stopBtn=h("button",{style:{padding:"14px 32px",background:"var(--border)",borderRadius:"14px",color:"var(--t2)",fontWeight:800,fontSize:"14px",marginTop:"20px"},onClick:()=>{running=false;clearInterval(interval);overlay.remove();S.focusTask=null}});
  stopBtn.textContent="Stop early";

  const doneBtn=h("button",{style:{padding:"14px 32px",background:"var(--green)",borderRadius:"14px",color:"var(--bg)",fontWeight:800,fontSize:"14px"},onClick:()=>{running=false;clearInterval(interval);toggleTask(task.id);overlay.remove();S.focusTask=null}});
  doneBtn.textContent="Done already";

  overlay.append(title,h("div",{style:{height:"20px"}}),taskName,h("div",{style:{height:"8px"}}),timeDisplay,sub,h("div",{style:{height:"12px"}}),h("div",{style:{display:"flex",gap:"10px"}},doneBtn,stopBtn));
  document.body.append(overlay);
}

// ── TRACKER TAB ──

// ── REPORT TAB ──
function renderReport(page){
  const pad=h("div",{className:"pad"});
  const wd=getWeekDates(S.selDate);
  pad.append(h("div",{style:{fontSize:"22px",fontWeight:900,color:"var(--t1)",marginBottom:"14px"}},"Weekly Report"));

  const wGrid=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"4px",marginBottom:"16px"}});
  wd.forEach((date,i)=>{
    const dt=S.tasks.filter(t=>t.date===date),d=dt.filter(t=>t.done).length,tot=dt.length;
    const isSel=date===S.selDate,isT=date===getToday(),p=tot>0?(d/tot)*100:0;
    wGrid.append(h("button",{style:{background:isSel?"color-mix(in srgb,var(--accent) 8%,var(--card))":"var(--card)",border:"1.5px solid "+(isSel?"color-mix(in srgb,var(--accent) 20%,var(--border))":"var(--border)"),borderRadius:"8px",padding:"8px 2px",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px"},onClick:()=>{S.selDate=date;S.tab="day";render()}},
      h("span",{style:{fontSize:"9px",fontWeight:800,color:isSel?"var(--accent)":"var(--t3)",letterSpacing:"1px"}},WK[i]),
      h("span",{style:{fontSize:"16px",fontWeight:900,color:isSel?"var(--t1)":"var(--t2)"}},String(new Date(date+"T12:00:00").getDate())),
      tot>0?h("span",{style:{fontSize:"9px",fontWeight:700,color:p===100?"var(--green)":"var(--t3)"}},d+"/"+tot):null,
      S.moods[date]?h("span",{style:{fontSize:"7px",color:MOODS.find(m=>m.v===S.moods[date])?.c}},"●"):null
    ));
  });
  pad.append(wGrid);

  const cs={};Object.keys(CATS).forEach(k=>cs[k]={t:0,d:0});
  let tA=0,dA=0;
  wd.forEach(date=>S.tasks.filter(t=>t.date===date).forEach(t=>{const c=t.category||"selfcare";if(cs[c]){cs[c].t++;if(t.done)cs[c].d++}tA++;if(t.done)dA++}));
  const pct=tA>0?Math.round(dA/tA*100):0;

  pad.append(h("div",{style:{textAlign:"center",marginBottom:"16px"}},
    h("div",{style:{fontSize:"48px",fontWeight:900,color:pct>=70?"var(--green)":pct>=40?"var(--amber)":"var(--coral)"}},pct+"%"),
    h("div",{style:{fontSize:"13px",color:"var(--t3)"}},dA+" of "+tA+" tasks this week")
  ));

  const wm=wd.map(d=>S.moods[d]).filter(Boolean);
  if(wm.length){const avg=wm.reduce((s,m)=>s+m,0)/wm.length;const ml=MOODS.find(m=>m.v===Math.round(avg));
    pad.append(h("div",{style:{background:"var(--card)",borderRadius:"10px",padding:"12px",marginBottom:"12px",border:"1px solid var(--border)",textAlign:"center"}},h("div",{style:{fontSize:"11px",fontWeight:700,color:"var(--t3)"}},"Average mood"),h("div",{style:{fontSize:"20px",fontWeight:900,color:ml?.c||"var(--t2)"}},ml?.l||"?")));}

  Object.entries(cs).filter(([,v])=>v.t>0).forEach(([k,v])=>{
    const cat=CATS[k],p=v.t>0?Math.round(v.d/v.t*100):0;
    pad.append(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}},
      h("span",{style:{fontSize:"11px",fontWeight:700,color:cat.color,width:"16px",textAlign:"center"}},cat.icon),
      h("span",{style:{fontSize:"12px",fontWeight:700,color:"var(--t2)",width:"110px"}},cat.label),
      h("div",{style:{flex:1},className:"fill-bar"},h("div",{className:"fill-inner",style:{width:p+"%",background:cat.color}})),
      h("span",{style:{fontSize:"11px",fontWeight:800,color:cat.color,width:"36px",textAlign:"right"}},v.d+"/"+v.t)
    ));
  });

  const struggling=Object.entries(cs).filter(([,v])=>v.t>=3&&v.d/v.t<.4).map(([k])=>CATS[k].label);
  const strong=Object.entries(cs).filter(([,v])=>v.t>=2&&v.d/v.t>=.8).map(([k])=>CATS[k].label);
  if(struggling.length)pad.append(h("div",{style:{background:"color-mix(in srgb,var(--coral) 6%,var(--card))",borderRadius:"10px",padding:"12px",margin:"12px 0",border:"1px solid color-mix(in srgb,var(--coral) 12%,var(--border))"}},h("div",{style:{fontSize:"11px",fontWeight:800,color:"var(--coral)",marginBottom:"4px"}},"Finding these hard"),h("div",{style:{fontSize:"12px",color:"var(--t2)",fontWeight:600}},struggling.join(", ")),h("div",{style:{fontSize:"10px",color:"var(--t3)",marginTop:"4px"}},"Try fewer tasks or break them into smaller steps.")));
  if(strong.length)pad.append(h("div",{style:{background:"color-mix(in srgb,var(--green) 6%,var(--card))",borderRadius:"10px",padding:"12px",margin:"12px 0",border:"1px solid color-mix(in srgb,var(--green) 12%,var(--border))"}},h("div",{style:{fontSize:"11px",fontWeight:800,color:"var(--green)",marginBottom:"4px"}},"Strengths"),h("div",{style:{fontSize:"12px",color:"var(--t2)",fontWeight:600}},strong.join(", "))));

  // Patterns
  const patterns=[];
  const bestDay=wd.map((d,i)=>{const dt=S.tasks.filter(t=>t.date===d);return{day:WK[i],pct:dt.length>0?dt.filter(t=>t.done).length/dt.length:0}}).sort((a,b)=>b.pct-a.pct)[0];
  if(bestDay&&bestDay.pct>.5)patterns.push("Your best day this week was "+bestDay.day+".");
  const morningDone=S.tasks.filter(t=>wd.includes(t.date)&&t.block==="morning"&&t.done).length;
  const morningTotal=S.tasks.filter(t=>wd.includes(t.date)&&t.block==="morning").length;
  if(morningTotal>=5&&morningDone/morningTotal>.7)patterns.push("You're strongest in the mornings. Front-load your important tasks.");
  if(morningTotal>=5&&morningDone/morningTotal<.3)patterns.push("Mornings are tough for you. Try shifting tasks to afternoon.");

  if(patterns.length)pad.append(h("div",{style:{background:"var(--card)",borderRadius:"10px",padding:"12px",marginTop:"12px",border:"1px solid var(--border)"}},h("div",{style:{fontSize:"11px",fontWeight:800,color:"var(--t3)",marginBottom:"6px",letterSpacing:".5px"}},"PATTERNS"),h("div",{style:{fontSize:"12px",color:"var(--t2)",fontWeight:600,lineHeight:"1.6"}},patterns.join(" "))));

  page.append(pad);
}

// ── MODALS ──
function renderShopModal(){
  let items=[],checked=new Set();
  const bg=h("div",{className:"modal-bg",onClick:e=>{if(e.target===bg)bg.remove()}});
  const box=h("div",{className:"modal-box"});
  const hdr=h("div",{style:{padding:"16px 18px",background:"linear-gradient(135deg,#5AA897,#6BA583)",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}});
  hdr.append(h("h2",{style:{fontSize:"17px",fontWeight:800,color:"#fff"}},"Weekly Shop"));
  const hBtns=h("div",{style:{display:"flex",gap:"6px"}});
  const copyBtn=h("button",{style:{background:"rgba(0,0,0,.15)",borderRadius:"8px",padding:"6px 10px",color:"#fff",fontWeight:800,fontSize:"10px",display:"none"},onClick:()=>{navigator.clipboard?.writeText(items.map(i=>`${checked.has(i)?"[x]":"[ ]"} ${i}`).join("\n"));alert("Copied!")}},"COPY");
  hBtns.append(copyBtn,h("button",{style:{background:"rgba(0,0,0,.15)",borderRadius:"8px",width:"32px",height:"32px",fontSize:"14px",color:"#fff",fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"},onClick:()=>bg.remove()},"✕"));

      const wrap=h("div",{className:"wrap"});
      sugs.forEach(item=>{const added=items.includes(item);wrap.append(h("button",{className:"tag",style:{background:added?"var(--teal)":"",color:added?"var(--bg)":"",borderColor:added?"var(--teal)":""},onClick:()=>{if(added){items=items.filter(x=>x!==item);checked.delete(item)}else items.push(item);draw()}},added?"✓ "+item:item))});
      body.append(wrap);

    const row=h("div",{style:{display:"flex",gap:"5px",margin:"10px 0"}});

    body.append(row);

        h("div",{style:{width:"22px",height:"22px",borderRadius:"5px",border:"2px solid",borderColor:ch?"var(--green)":"var(--t3)",background:ch?"var(--green)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",color:"var(--bg)",fontWeight:900,flexShrink:0}},ch?"✓":""),
