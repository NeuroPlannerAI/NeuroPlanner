<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F8F6F3" id="tc">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.svg">
<title>NeuroPlanner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<style>
:root{
--bg:#F8F6F3;--bg2:#EFECEA;--card:#FFFFFF;--border:#E5E0DB;--border2:#D8D2CB;
--t1:#2A2520;--t2:#6B6058;--t3:#9A9088;--t4:#BEB6AE;
--accent:#B87385;--green:#5EA882;--amber:#BEA040;--coral:#C08070;
--teal:#5A9E98;--lilac:#8E7EB0;--warm:#A88858;
--sh:0 1px 4px rgba(42,37,32,.05),0 6px 16px rgba(42,37,32,.04);
--sh2:0 4px 12px rgba(42,37,32,.08),0 12px 32px rgba(42,37,32,.06);
--radius:16px;--radius-sm:12px;--radius-xs:8px;
}
.dark{
--bg:#161616;--bg2:#1E1E1E;--card:#262626;--border:#363636;--border2:#444;
--t1:#E8E4E0;--t2:#A09890;--t3:#686058;--t4:#484040;
--sh:0 1px 4px rgba(0,0,0,.2),0 6px 16px rgba(0,0,0,.12);
--sh2:0 4px 12px rgba(0,0,0,.25),0 12px 32px rgba(0,0,0,.2);
}
.calm{--accent:#8A8A8A;--green:#7A9A8A;--amber:#9A9A7A;--coral:#9A8A8A;--teal:#7A9090;--lilac:#8A8A98}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--t1);font-family:'DM Sans',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;height:100dvh;overflow:hidden;overscroll-behavior:none}
body{display:flex;flex-direction:column;padding-top:env(safe-area-inset-top)}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:16px;-webkit-appearance:none}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--t1);-webkit-appearance:none;appearance:none}
input::placeholder{color:var(--t4)}
::-webkit-scrollbar{width:0;display:none}

/* Layout */
.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pad{max-width:560px;margin:0 auto;padding:20px 16px 32px}
@media(min-width:768px){.pad{padding:24px 24px 40px}}

/* Tabs */
.tabs{display:flex;background:var(--card);border-top:1px solid var(--border);padding:6px 8px calc(6px + env(safe-area-inset-bottom));gap:2px;flex-shrink:0}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;border-radius:var(--radius-sm);color:var(--t3);font-size:10px;font-weight:700;min-height:48px;justify-content:center}
.tb.on{color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,transparent)}

/* Toast */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);padding:14px 28px;border-radius:20px;font-weight:800;font-size:15px;z-index:2000;opacity:0;transition:all .4s cubic-bezier(.22,1,.36,1);pointer-events:none;box-shadow:var(--sh2);color:#fff;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Cards */
.cd{background:var(--card);border-radius:var(--radius);box-shadow:var(--sh);margin-bottom:10px;overflow:hidden}
.cp{padding:16px}
@media(min-width:768px){.cp{padding:20px}}

/* Buttons */
.btn{padding:14px 24px;border-radius:var(--radius-sm);font-weight:700;font-size:15px;min-height:48px;display:flex;align-items:center;justify-content:center;transition:transform .1s,opacity .1s}
.btn:active{transform:scale(.97);opacity:.8}
.btn-accent{background:var(--accent);color:#fff}
.btn-ghost{background:var(--bg2);color:var(--t2);border:1px solid var(--border)}

/* Tags */
.tag{border-radius:var(--radius-sm);padding:12px 16px;font-size:15px;font-weight:600;border:1.5px solid var(--border);background:var(--card);color:var(--t1);min-height:48px;display:inline-flex;align-items:center;gap:8px;box-shadow:var(--sh);transition:transform .1s,border-color .15s}
.tag:active{transform:scale(.97)}
.tag.on{border-color:var(--green);color:var(--green);background:color-mix(in srgb,var(--green) 5%,var(--card))}
.tag .sub{font-size:12px;color:var(--t3);font-weight:600}

/* Task blocks */
.tbl{display:flex;align-items:stretch;border-radius:var(--radius);background:var(--card);box-shadow:var(--sh);margin-bottom:8px;overflow:hidden;min-height:64px;transition:opacity .3s}
.tbl.dn{opacity:.4}
.tedge{width:5px;flex-shrink:0}
.tbody{flex:1;display:flex;align-items:center;gap:12px;padding:14px 16px}
.tck{width:36px;height:36px;border-radius:10px;border:2.5px solid var(--t4);background:transparent;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--card);font-weight:900;flex-shrink:0;min-width:36px;min-height:36px}
.tck.dn{background:var(--green);border-color:var(--green)}
.tname{font-size:16px;font-weight:600;line-height:1.3}
.tbl.dn .tname{text-decoration:line-through;color:var(--t3)}
.tdur{font-size:13px;color:var(--t3);font-weight:600;margin-top:2px}
.tact{display:flex;gap:6px;align-items:center;flex-shrink:0}
.tfocus{font-size:12px;font-weight:800;color:var(--green);background:color-mix(in srgb,var(--green) 8%,var(--card));border:1px solid color-mix(in srgb,var(--green) 18%,var(--border));border-radius:var(--radius-xs);padding:8px 12px;min-height:36px}
.tdel{color:var(--t4);font-size:22px;padding:8px;min-width:40px;min-height:40px;display:flex;align-items:center;justify-content:center}

/* Block headers */
.bhdr{display:flex;align-items:center;gap:10px;padding:16px 4px 8px}
.bdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.blbl{font-size:13px;font-weight:800;color:var(--t2);letter-spacing:.5px}
.bline{flex:1;height:1px;background:var(--border)}

/* Next bar */
.nbar{background:var(--card);border-radius:var(--radius);box-shadow:var(--sh);padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;border-left:5px solid var(--accent)}

/* Fill bars */
.fbar{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.ffill{height:100%;border-radius:4px;transition:width .5s ease}

/* Sheet */
.shbg{position:fixed;inset:0;background:rgba(42,37,32,.35);z-index:900;opacity:0;pointer-events:none;transition:opacity .25s}
.shbg.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:24px 24px 0 0;padding:24px 20px calc(24px + env(safe-area-inset-bottom));z-index:901;transform:translateY(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);box-shadow:0 -8px 40px rgba(42,37,32,.15);max-height:75dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sheet.show{transform:translateY(0)}

/* Timer */
.tmr{position:fixed;inset:0;background:var(--bg);z-index:1100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px}

/* Sensory toolkit overlay */
.sto{position:fixed;inset:0;background:var(--bg);z-index:1050;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;text-align:center}

/* Celebration overlay */
.celeb{position:fixed;inset:0;background:color-mix(in srgb,var(--green) 8%,var(--bg));z-index:1050;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px;text-align:center;animation:fadeIn .5s ease}

/* Mood buttons */
.mbtn{flex:1;padding:12px 4px;border-radius:var(--radius-sm);text-align:center;background:var(--card);border:1.5px solid var(--border);font-size:14px;font-weight:700;color:var(--t2);min-height:48px;display:flex;align-items:center;justify-content:center}
.mbtn.on{border-width:2.5px}

/* Wrap */
.wrap{display:flex;flex-wrap:wrap;gap:8px}

/* Quiz specific */
.qopt{width:100%;padding:16px 18px;border-radius:var(--radius);background:var(--card);border:2px solid var(--border);text-align:left;font-size:16px;font-weight:600;min-height:56px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh);transition:border-color .15s}
.qopt.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 5%,var(--card))}
.qopt:active{transform:scale(.98)}
.qdot{width:24px;height:24px;border-radius:50%;border:2.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--card);transition:all .15s}
.qopt.on .qdot{background:var(--accent);border-color:var(--accent)}
.qchk{width:24px;height:24px;border-radius:6px;border:2.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--card);transition:all .15s}
.qopt.on .qchk{background:var(--accent);border-color:var(--accent)}
.qprog{height:4px;background:var(--bg2);border-radius:2px;margin-bottom:24px;overflow:hidden}
.qpfill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
.qinp{width:100%;padding:14px 16px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--card);font-size:16px;font-weight:600;outline:none;min-height:52px}
.qinp:focus{border-color:var(--accent)}

/* Sensory toolkit button - always visible */
.stbtn{position:fixed;bottom:calc(70px + env(safe-area-inset-bottom));right:16px;width:48px;height:48px;border-radius:50%;background:var(--card);box-shadow:var(--sh2);display:flex;align-items:center;justify-content:center;font-size:20px;z-index:100;color:var(--teal);border:1.5px solid var(--border)}

/* Just the next thing mode */
.jnxt{position:fixed;inset:0;background:var(--bg);z-index:1050;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:32px;text-align:center}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="shbg" id="shbg"></div>
<div class="sheet" id="sheet"></div>
<div class="page" id="page"></div>
<div class="tabs" id="tabs" style="display:none"></div>
<script>
"use strict";
// ── STORAGE ──
function LS(k,d){try{var v=localStorage.getItem("np_"+k);return v?JSON.parse(v):d}catch(e){return d}}
function SS(k,v){try{localStorage.setItem("np_"+k,JSON.stringify(v))}catch(e){}}
function TD(){return new Date().toISOString().split("T")[0]}
function uid(){return Date.now()+Math.random()}
var WK=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
function wkDates(r){var d=new Date(r+"T12:00:00"),dy=d.getDay(),df=d.getDate()-dy+(dy===0?-6:1),m=new Date(d);m.setDate(df);var out=[];for(var i=0;i<7;i++){var x=new Date(m);x.setDate(m.getDate()+i);out.push(x.toISOString().split("T")[0])}return out}
function fmtD(s){return new Date(s+"T12:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})}
function fmtS(s){return new Date(s+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}
function fmtM(m){if(m>=60){var h=Math.floor(m/60),r=m%60;return h+"h"+(r?" "+r+"m":"")}return m+"m"}

// ── DOM HELPER ──
function h(tag,a){
var el=document.createElement(tag);
if(a){for(var k in a){if(!a.hasOwnProperty(k))continue;var v=a[k];
if(k==="style"&&typeof v==="object"){for(var s in v)el.style[s]=v[s]}
else if(k==="onClick"){el.addEventListener("click",v)}
else if(k==="onInput"){el.addEventListener("input",v)}
else if(k==="onKeydown"){el.addEventListener("keydown",v)}
else if(k==="onChange"){el.addEventListener("change",v)}
else if(k==="className"){el.className=v}
else if(k==="htmlFor"){el.setAttribute("for",v)}
else{el.setAttribute(k,v)}
}}
for(var i=2;i<arguments.length;i++){
var c=arguments[i];
if(c==null)continue;
if(Array.isArray(c)){for(var j=0;j<c.length;j++){if(c[j]!=null)el.append(typeof c[j]==="string"||typeof c[j]==="number"?String(c[j]):c[j])}}
else{el.append(typeof c==="string"||typeof c==="number"?String(c):c)}
}
return el;
}

function toast(msg,bg){var t=document.getElementById("toast");t.textContent=msg;t.style.background=bg||"var(--green)";t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show")},2000)}
function showSheet(el){var bg=document.getElementById("shbg"),sh=document.getElementById("sheet");sh.innerHTML="";sh.append(el);bg.classList.add("show");sh.classList.add("show");bg.onclick=hideSheet}
function hideSheet(){document.getElementById("shbg").classList.remove("show");document.getElementById("sheet").classList.remove("show")}

// ── TASK LIBRARY GENERATION ──
// This builds personalised task pools based on quiz answers
function buildLibrary(profile){
var lib={};
// Everyone gets self care
lib.selfcare={l:"Looking After You",c:"var(--coral)",tasks:[]};
var sc=lib.selfcare.tasks;
sc.push(["Drink 2L water",1],["Eat a proper meal",20],["Fresh air (15 min)",15],["Read 10 pages",15]);
if(profile.struggles&&profile.struggles.indexOf("phone")>=0){sc.push(["No phone for 1 hour",60],["Screen time check",5])}
if(profile.struggles&&profile.struggles.indexOf("routine")>=0){sc.push(["Bed before 11pm",1],["Make your bed",3])}
if(profile.struggles&&profile.struggles.indexOf("selfcare")>=0){sc.push(["Gratitude list (3 things)",5],["Call someone you care about",15])}
if(profile.conditions&&(profile.conditions.indexOf("autism")>=0||profile.conditions.indexOf("ocd")>=0)){sc.push(["Sensory break",15],["Noise cancelling headphones break",15])}
if(profile.conditions&&profile.conditions.indexOf("bpd")>=0){sc.push(["Grounding exercise",10],["Check in with yourself",5])}
sc.push(["Take your meds",2]);

// Hygiene - varies by gender
lib.hygiene={l:"Hygiene + Self Care",c:"var(--accent)",tasks:[]};
var hy=lib.hygiene.tasks;
hy.push(["Shower",15],["Brush teeth",3],["Skincare routine",15],["Moisturise",5]);
if(profile.gender==="female"||profile.gender==="nonbinary"){
hy.push(["Fake tan",40],["Hair wash day",30],["Do my nails",30],["Everything shower",60],["Relax bath",45],["Face mask",25],["Shave legs",15],["Deep condition hair",30],["Exfoliate",10],["Eyebrow tidy",10],["Lip scrub + balm",5],["Dry brush",10]);
}
if(profile.gender==="male"||profile.gender==="nonbinary"){
hy.push(["Trim beard/stubble",10],["Hair cut appointment",5],["Sort out grooming kit",10],["Face wash properly",5],["Trim nails",5],["Iron a shirt",10]);
}
hy.push(["Clean makeup/grooming area",15],["Sort out bathroom shelf",10]);

// Household - varies by living situation
lib.household={l:"Sort The House",c:"var(--teal)",tasks:[]};
var hh=lib.household.tasks;
hh.push(["Hoover",20],["Put a wash on",5],["Hang washing up",10],["Wipe kitchen sides",10],["Empty bins",10],["Tidy living room",15]);
if(profile.living==="alone"||profile.living==="partner"){
hh.push(["Change bedding",20],["Wash the floors",30],["Clean bathroom",30],["Sort the fridge",15],["Dust surfaces",15],["Descale kettle",10],["Weekly food shop",60],["Ironing pile",30],["Clean windows",25],["Meal prep",45]);
}
if(profile.living==="family"||profile.living==="housemates"){
hh.push(["Clean your room",20],["Tidy shared spaces",15],["Do your share of washing up",10],["Take the bins out",5],["Hoover your area",15],["Cook a meal for everyone",40]);
}
if(profile.living==="parents"){
hh.push(["Tidy your room",15],["Help with washing up",10],["Help with cooking",20],["Put your washing in the basket",2],["Take bins out",5],["Offer to hoover",15]);
}
hh.push(["Deep clean microwave",15],["Tidy junk drawer",15],["Sort recycling",10]);

// Pets
if(profile.pets&&profile.pets.length>0){
profile.pets.forEach(function(pet){
var key="pet_"+pet.name.toLowerCase().replace(/\s/g,"_");
lib[key]={l:pet.name,c:"var(--warm)",tasks:[]};
var pt=lib[key].tasks;
if(pet.type==="dog"){
pt.push(["Walk "+pet.name+" (15 min)",20],["Walk "+pet.name+" (30 min)",35],["Walk "+pet.name+" (45 min)",50],["Walk "+pet.name+" (1 hour)",65],["Bath "+pet.name,45],["Wash "+pet.name+"'s toys",20],["Wash "+pet.name+"'s blankets",15],["Meal prep for "+pet.name,30],["Brush "+pet.name,15],["Trim "+pet.name+"'s nails",10],["Clean "+pet.name+"'s bowls",5],["Refill treat jar",5],["Training session with "+pet.name,15],["Worm/flea treatment for "+pet.name,5],[""+pet.name+" dental chew",5]);
}else if(pet.type==="cat"){
pt.push(["Feed "+pet.name,5],["Clean "+pet.name+"'s litter tray",10],["Play with "+pet.name+" (15 min)",15],["Brush "+pet.name,10],["Clean "+pet.name+"'s bowls",5],["Worm/flea treatment for "+pet.name,5],["Wash "+pet.name+"'s blankets",15],["Check "+pet.name+"'s water",2]);
}else if(pet.type==="fish"){
pt.push(["Feed "+pet.name,2],["Check water temperature",2],["Clean tank",30],["Water change",20],["Check filter",5]);
}else{
pt.push(["Feed "+pet.name,5],["Clean "+pet.name+"'s area",15],["Check "+pet.name+"'s water/food",5],["Spend time with "+pet.name,15]);
}
});
}

// Exercise
lib.exercise={l:"Move Your Body",c:"var(--green)",tasks:[]};
var ex=lib.exercise.tasks;
ex.push(["30 min walk with podcast",35],["Yoga session",30],["10 min stretch",10],["Dance around the house",15],["Pilates video",25],["Go for a run",35],["HIIT (15 min)",20],["Ab workout",15],["YouTube workout",25],["Stairs x10 in the house",10]);

// Creative
lib.creative={l:"Creative (phone down)",c:"var(--lilac)",tasks:[]};
var cr=lib.creative.tasks;
cr.push(["Draw or doodle (20 min)",25],["Journal / brain dump",15],["Try a new recipe",45],["Rearrange a room",30],["DIY project",45],["Write a letter",20],["Colouring book",25],["Read for 30 mins",30],["Knit or crochet",30],["Try calligraphy",25],["Bake something",50]);

// Life admin
lib.admin={l:"Life Admin",c:"var(--amber)",tasks:[]};
var ad=lib.admin.tasks;
ad.push(["Order meds",10],["Check bills are paid",10],["Check bank balance",5],["Reply to that message",5],["File paperwork",15],["Check direct debits",10],["Renew prescription",10]);
if(profile.goals&&profile.goals.indexOf("money")>=0){ad.push(["Finance spreadsheet",30],["Cancel unused subscriptions",10],["Check credit score",5])}
ad.push(["Book GP appointment",10],["Book dentist",5],["Therapy session",60],["That thing you keep avoiding",20],["Back up phone photos",15],["Unsubscribe from junk emails",15]);

// Social - varies by relationship status
lib.social={l:"Social + Relationships",c:"var(--accent)",tasks:[]};
var so=lib.social.tasks;
if(profile.living==="partner"){
so.push(["Plan a date night",10],["Get flowers / small gift",15],["Cook together",40],["Remember partner's appointment",5],["Text something nice",2],["Watch something together",5]);
}
so.push(["Message a friend you haven't spoken to",5],["Plan something with friends/family",10],["Call someone you care about",15]);
if(profile.living==="alone"||profile.living==="parents"){
so.push(["Plan a solo trip out",10],["Go to a cafe alone (it counts)",30],["Join an online community",15]);
}

return lib;
}

// ── BRAIN STATES ──
var ENERGY=[{v:3,l:"High",c:"var(--green)"},{v:2,l:"Medium",c:"var(--amber)"},{v:1,l:"Low",c:"var(--coral)"}];
var FOCUS=[{v:3,l:"Sharp",c:"var(--green)"},{v:2,l:"Foggy",c:"var(--amber)"},{v:1,l:"Scattered",c:"var(--coral)"}];
var MOODSTATE=[{v:3,l:"Good",c:"var(--green)"},{v:2,l:"Flat",c:"var(--amber)"},{v:1,l:"Anxious",c:"var(--coral)"}];
var MOODS=[{v:5,l:"Great",c:"var(--green)"},{v:4,l:"Good",c:"var(--teal)"},{v:3,l:"Okay",c:"var(--amber)"},{v:2,l:"Low",c:"var(--accent)"},{v:1,l:"Rough",c:"var(--coral)"}];

var MODES=[
{k:"chill",l:"Chill Day",d:"Light and easy. Bare minimum only.",max:90},
{k:"pamper",l:"Pamper Day",d:"Self care focus. Treat yourself.",max:180},
{k:"chores",l:"Chores Blitz",d:"Sort the house out.",max:240},
{k:"work",l:"Work Day",d:"Minimal tasks around your job.",max:90},
{k:"catchup",l:"Catch-Up Day",d:"Admin, bills, the stuff you avoid.",max:180},
{k:"active",l:"Active Day",d:"Move your body. Get outside.",max:150},
{k:"creative",l:"Creative Day",d:"Phone down. Make something.",max:180},
{k:"custom",l:"Build My Own",d:"Pick from everything.",max:300}
];

var BLK=[
{key:"morning",label:"Morning",cap:180,color:"var(--amber)"},
{key:"afternoon",label:"Afternoon",cap:240,color:"var(--accent)"},
{key:"evening",label:"Evening",cap:180,color:"var(--lilac)"},
{key:"anytime",label:"Anytime",cap:999,color:"var(--teal)"}
];

var AMSG=["Added!","On the list!","Locked in!","Sorted!","Got it!"];
var DMSG=["Done!","Smashed it.","Ticked off.","Boom.","Sorted."];

// ── STATE ──
var S={
profile:LS("profile",null),
tasks:LS("tasks",[]),
date:TD(),
tab:"plan",
spending:LS("spending",{budget:20,items:[]}),
moods:LS("moods",{}),
checkins:LS("checkins",{}),
brainState:LS("brainState",{}),
dayModes:LS("dayModes",{}),
recurring:LS("recurring",[]),
rolled:LS("rolled",""),
streaks:LS("streaks",{}),
parking:LS("parking",[]),

function boot(){
var td=TD();if(S.rolled===td)return;
// Rollover
var y=new Date();y.setDate(y.getDate()-1);var ys=y.toISOString().split("T")[0];
var inc=S.tasks.filter(function(t){return t.date===ys&&!t.done});
if(inc.length){
var ids={};inc.forEach(function(t){ids[t.id]=1});
S.tasks=S.tasks.filter(function(t){return!ids[t.id]});
inc.forEach(function(t){S.tasks.push({id:uid(),text:t.text,done:false,cat:t.cat,date:td,rolledOver:true,block:t.block,mins:t.mins,daysOld:(t.daysOld||0)+1})});
}
// Recurring
var dow=new Date().getDay(),adj=dow===0?6:dow-1;
var have={};S.tasks.filter(function(t){return t.date===td}).forEach(function(t){have[t.text]=1});
S.recurring.forEach(function(r){
if(r.days.indexOf(adj)>=0&&!have[r.text]){
S.tasks.push({id:uid(),text:r.text,done:false,cat:r.cat,date:td,rolledOver:false,block:r.block,mins:r.mins||15});
}
});
updStreaks();
S.rolled=td;sv();
}

function updStreaks(){
if(!S.profile)return;
var track=["Take your meds","Drink 2L water","Make your bed"];
if(S.profile.pets){S.profile.pets.forEach(function(p){if(p.type==="dog")track.push("Walk "+p.name)})}
track.forEach(function(task){
var c=0;
for(var i=0;i<30;i++){
var d=new Date();d.setDate(d.getDate()-i);var ds=d.toISOString().split("T")[0];
var pfx=task.split(" ").slice(0,2).join(" ");
var found=false;
S.tasks.forEach(function(t){if(t.date===ds&&t.text.indexOf(pfx)===0&&t.done)found=true});
if(found)c++;else if(i>0)break;
}
S.streaks[task]=c;
});
}

for(var k in kwMap){var score=0;kwMap[k].forEach(function(w){if(l.indexOf(w)>=0)score++});if(score>bestScore){bestScore=score;bestCat=k}}

if(S.profile&&S.profile.pets){S.profile.pets.forEach(function(pet){if(l.indexOf(pet.name.toLowerCase())>=0)bestCat="pet_"+pet.name.toLowerCase().replace(/\s/g,"_")})}

var pct=b.cap<999?Math.min(100,Math.round(((used+m)/b.cap)*100)):0;

else if(mk==="work")relevantCats=["selfcare","admin"];
else if(mk==="catchup")relevantCats=["admin","household","selfcare"];
else if(mk==="active")relevantCats=["exercise","selfcare"];
else if(mk==="creative")relevantCats=["creative","selfcare"];

// Add pet categories to relevant modes

// ── OVERLAYS ──
function startTimer(task){
var mins=Math.min(task.mins||25,60),rem=mins*60,on=true;
var ov=h("div",{className:"tmr"});
var disp=h("div",{style:{fontSize:"72px",fontWeight:900,color:"var(--t1)",fontVariantNumeric:"tabular-nums"}});
function upd(){var m=Math.floor(rem/60),s=rem%60;disp.textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")}
upd();
var iv=setInterval(function(){if(!on)return;rem--;upd();if(rem<=0){clearInterval(iv);toast("Timer done!","var(--green)");togTask(task.id);ov.remove()}},1000);
ov.append(
h("div",{style:{fontSize:"13px",fontWeight:800,color:"var(--t3)",letterSpacing:"1px"}},"FOCUS MODE"),
h("div",{style:{height:"20px"}}),
h("div",{style:{fontSize:"20px",fontWeight:700,color:"var(--t2)",textAlign:"center",maxWidth:"300px"}},task.text),
h("div",{style:{height:"12px"}}),
disp,
h("div",{style:{fontSize:"14px",color:"var(--t3)",fontWeight:600}},"Phone down. Just this one thing."),
h("div",{style:{height:"28px"}}),
h("div",{style:{display:"flex",gap:"12px"}},[
h("button",{className:"btn btn-accent",style:{padding:"16px 32px",fontSize:"16px"},onClick:function(){on=false;clearInterval(iv);togTask(task.id);ov.remove()}},"Done early"),
h("button",{className:"btn btn-ghost",style:{padding:"16px 32px",fontSize:"16px"},onClick:function(){on=false;clearInterval(iv);ov.remove()}},"Stop")
])
);
document.body.append(ov);
}

function showJustNext(tasks){
var undone=tasks.filter(function(t){return!t.done});
if(!undone.length)return;
var idx=0;
function showOne(){
if(idx>=undone.length){ov.remove();render();return}
var task=undone[idx];
ov.innerHTML="";
ov.append(
h("div",{style:{fontSize:"13px",fontWeight:800,color:"var(--t3)",letterSpacing:"1px"}},"JUST THE NEXT THING"),
h("div",{style:{height:"24px"}}),
h("div",{style:{fontSize:"13px",color:"var(--t3)",fontWeight:600}},(idx+1)+" of "+undone.length),
h("div",{style:{height:"8px"}}),
h("div",{style:{fontSize:"28px",fontWeight:900,color:"var(--t1)",maxWidth:"320px",lineHeight:"1.3"}},task.text),
h("div",{style:{fontSize:"16px",color:"var(--t3)",fontWeight:600,marginTop:"8px"}},fmtM(task.mins||15)),
h("div",{style:{height:"32px"}}),
h("button",{className:"btn btn-accent",style:{padding:"18px 40px",fontSize:"18px"},onClick:function(){togTask(task.id);idx++;showOne()}},"Done"),
h("div",{style:{height:"12px"}}),
h("button",{className:"btn btn-ghost",style:{padding:"14px 32px",fontSize:"15px"},onClick:function(){idx++;showOne()}},"Skip"),
h("div",{style:{height:"12px"}}),
h("button",{style:{color:"var(--t3)",fontSize:"14px",fontWeight:600,padding:"10px"},onClick:function(){ov.remove();render()}},"Exit focus mode")
);
}
var ov=h("div",{className:"jnxt"});
showOne();
document.body.append(ov);
}
