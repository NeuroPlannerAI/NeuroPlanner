<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1E1D24">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.svg">
<title>Brain Dump</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<style>
:root{
--bg:#1E1D24;--bg2:#272630;--card:#2E2D38;--border:#3A3948;--border2:#4A4960;
--t1:#E8E6F0;--t2:#B0AEBE;--t3:#7A7890;--t4:#55536A;
--accent:#C490A0;--green:#78B898;--amber:#C4AA60;--coral:#C48878;
--teal:#68A8A4;--lilac:#A088C0;--warm:#B89868;
--ch:#C898B0;--ct:#70B0A8;--cb:#C0A070;--cc:#A890C4;--ce:#78B890;--cr:#C4AA60;--cs:#C08888;
--sh:0 2px 8px rgba(0,0,0,.2);
--sh2:0 4px 16px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--t1);font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;height:100dvh;overflow:hidden;overscroll-behavior:none}
body{display:flex;flex-direction:column;padding-top:env(safe-area-inset-top)}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:16px;transition:opacity .12s,transform .12s}
button:active{transform:scale(.97);opacity:.85}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--t1)}
input::placeholder{color:var(--t3)}
::-webkit-scrollbar{width:0;display:none}
.pg{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pad{max-width:540px;margin:0 auto;padding:16px 16px 32px}
.tabs{display:flex;background:var(--card);border-top:1px solid var(--border);padding:4px 6px calc(4px + env(safe-area-inset-bottom));gap:2px;flex-shrink:0}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:8px 0;border-radius:12px;color:var(--t3);font-size:10px;font-weight:700}
.tb.on{color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,transparent)}
.tb i{font-style:normal;font-size:18px;line-height:1}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);padding:12px 24px;border-radius:16px;font-weight:800;font-size:14px;z-index:2000;opacity:0;transition:all .35s cubic-bezier(.22,1,.36,1);pointer-events:none;box-shadow:var(--sh2);color:#fff}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.cd{background:var(--card);border-radius:16px;box-shadow:var(--sh);margin-bottom:10px;overflow:hidden}
.cp{padding:16px}
.tbl{display:flex;align-items:stretch;border-radius:14px;background:var(--card);box-shadow:var(--sh);margin-bottom:6px;overflow:hidden;min-height:56px;transition:opacity .3s}
.tbl.dn{opacity:.4}
.te{width:5px;flex-shrink:0}
.tbody{flex:1;display:flex;align-items:center;gap:12px;padding:12px 14px}
.tck{width:32px;height:32px;border-radius:10px;border:2.5px solid var(--t4);background:transparent;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--bg);font-weight:900;flex-shrink:0}
.tck.dn{background:var(--green);border-color:var(--green)}
.tn{font-size:15px;font-weight:600;color:var(--t1);line-height:1.3}
.tbl.dn .tn{text-decoration:line-through;color:var(--t3)}
.td{font-size:12px;color:var(--t2);font-weight:600;margin-top:2px}
.tfb{font-size:11px;font-weight:800;color:var(--green);background:color-mix(in srgb,var(--green) 12%,var(--card));border:1px solid color-mix(in srgb,var(--green) 25%,var(--border));border-radius:8px;padding:6px 10px}
.tdl{color:var(--t3);font-size:20px;padding:6px;line-height:1}
.bh{display:flex;align-items:center;gap:8px;padding:14px 4px 8px}
.bd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bl{font-size:12px;font-weight:800;color:var(--t2);letter-spacing:.5px}
.bln{flex:1;height:1px;background:var(--border)}
.nb{background:var(--card);border-radius:14px;box-shadow:var(--sh);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;border-left:4px solid var(--accent)}
.fb{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.fi{height:100%;border-radius:3px;transition:width .5s ease}
.wrap{display:flex;flex-wrap:wrap;gap:6px}
.tag{border-radius:10px;padding:10px 14px;font-size:14px;font-weight:600;border:1.5px solid var(--border);background:var(--card);color:var(--t1);box-shadow:var(--sh)}
.tag.added{border-color:var(--green);color:var(--green);opacity:.5}
.tag .dur{font-size:11px;color:var(--t3);font-weight:600;margin-left:4px}
.mc{border-radius:16px;padding:18px 16px;background:var(--card);box-shadow:var(--sh);border:2px solid var(--border);text-align:left;margin-bottom:8px}
.mc:active{border-color:var(--accent)}
.mc.sel{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 6%,var(--card))}
.sbg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:900;opacity:0;pointer-events:none;transition:opacity .25s}
.sbg.show{opacity:1;pointer-events:auto}
.sht{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:24px 24px 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom));z-index:901;transform:translateY(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);box-shadow:0 -4px 30px rgba(0,0,0,.2);max-height:70dvh;overflow-y:auto}
.sht.show{transform:translateY(0)}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.mbox{background:var(--card);border-radius:24px;max-width:500px;width:100%;max-height:85dvh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--sh2)}
.mbdy{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.tmr{position:fixed;inset:0;background:var(--bg);z-index:1100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px}
.mdb{flex:1;padding:10px 0;border-radius:10px;text-align:center;background:var(--card);border:2px solid var(--border);font-size:13px;font-weight:700;color:var(--t2)}
.mdb.on{border-width:2.5px}
.enb{padding:14px 16px;background:var(--card);border:2px solid var(--border);border-radius:14px;display:flex;align-items:center;gap:14px;text-align:left;margin-bottom:8px}
.enb.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 6%,var(--card))}
.rollover-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="sbg" id="sbg"></div>
<div class="sht" id="sht"></div>
<div class="pg" id="pg"></div>
<div class="tabs" id="tabs"></div>
<script>
var LS=function(k,d){try{var v=localStorage.getItem("bd4_"+k);return v?JSON.parse(v):d}catch(e){return d}};
var SS=function(k,v){try{localStorage.setItem("bd4_"+k,JSON.stringify(v))}catch(e){}};
var TD=function(){return new Date().toISOString().split("T")[0]};
var WK=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
var wkD=function(r){var d=new Date(r+"T12:00:00"),dy=d.getDay(),df=d.getDate()-dy+(dy===0?-6:1),m=new Date(d);m.setDate(df);return Array.from({length:7},function(_,i){var x=new Date(m);x.setDate(m.getDate()+i);return x.toISOString().split("T")[0]})};
var fD=function(s){return new Date(s+"T12:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})};
var fS=function(s){return new Date(s+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})};
var fM=function(m){return m>=60?Math.floor(m/60)+"h"+(m%60?" "+m%60+"m":""):m+"m"};
var uid=function(){return Date.now()+Math.random()};

var BLK=[
{key:"morning",label:"Morning",cap:180,color:"var(--amber)"},
{key:"afternoon",label:"Afternoon",cap:240,color:"var(--accent)"},
{key:"evening",label:"Evening",cap:180,color:"var(--lilac)"},
{key:"anytime",label:"Anytime",cap:999,color:"var(--teal)"}
];

var CAT={
hygiene:{l:"Pamper + Hygiene",ic:"*",c:"var(--ch)",t:[["Fake tan",40],["Hair wash day",30],["Do my nails",30],["Full skincare routine",25],["Relax bath",45],["Everything shower",60],["Face mask",25],["Shave legs",15],["Deep condition hair",30],["Exfoliate",10],["Eyebrow tidy",10],["Moisturise properly",10],["Dry brush",10],["Lip scrub + balm",5]],x:[["Hair oil treatment",25],["Foot soak + scrub",30],["Gua sha session",20],["Clean makeup brushes",20],["Scalp massage",10],["Sheet mask",25],["Body butter",10],["Organise skincare shelf",15]]},
household:{l:"Sort The House",ic:"#",c:"var(--ct)",t:[["Change bedding",20],["Wash the floors",30],["Hoover upstairs",15],["Hoover downstairs",15],["Put a wash on",5],["Hang washing up",10],["Weekly food shop",60],["Clean bathroom",30],["Wipe kitchen sides",10],["Empty all bins",10],["Tidy living room",15],["Sort the fridge",15],["Ironing pile",30],["Dust surfaces",15],["Descale kettle",10]],x:[["Clean windows",25],["Organise under sink",20],["Deep clean microwave",15],["Wipe door handles",10],["Sort recycling",10],["Tidy junk drawer",15],["Wash kitchen towels",10],["Defrost freezer",45]]},
bean:{l:"Bean",ic:"<3",c:"var(--cb)",t:[["Walk Bean (15 min)",20],["Walk Bean (30 min)",35],["Walk Bean (45 min)",50],["Walk Bean (1 hour)",65],["Bath Bean",45],["Wash Beans toys",20],["Wash Beans blankets",15],["Meal prep for Bean",30],["Brush Bean",15],["Trim Beans nails",10],["Clean Beans bowls",5],["Refill treat jar",5]],x:[["Training session (10 min)",15],["Enrichment toy time",15],["Clean Beans bed",20],["Worm/flea treatment",5],["New walk route",50],["Dental chew",5],["Paw wash",10]]},
creative:{l:"Creative (phone down)",ic:"~",c:"var(--cc)",t:[["Draw or doodle (20 min)",25],["Journal / brain dump",15],["Try a new recipe",45],["Rearrange a room",30],["DIY project",45],["Write a letter",20],["Colouring book",25],["Read for 30 mins",30],["Knit or crochet",30],["Try calligraphy",25],["Redecorate a shelf",15]],x:[["Collage from magazines",30],["Bake from scratch",50],["Sketch window view",25],["Make homemade cards",25],["Watercolour painting",30],["Press flowers",15]]},
exercise:{l:"Move Your Body",ic:"^",c:"var(--ce)",t:[["30 min walk with podcast",35],["Yoga session",30],["10 min stretch",10],["Dance around the house",15],["Pilates video",25],["Go for a run",35],["Skipping rope (10 min)",12],["HIIT (15 min)",20],["Ab workout",15],["Stairs x10",10],["YouTube workout",25]],x:[["Swim at local pool",50],["Park workout",30],["Gentle walk",20],["Resistance bands",20],["Foam roller",15],["Gardening",30]]},
reminders:{l:"Life Admin",ic:">",c:"var(--cr)",t:[["Order meds",10],["Finance spreadsheet",30],["Check bills are paid",10],["Book GP appointment",10],["Therapy session",60],["Check bank balance",5],["Reply to that message",5],["Book dentist",5],["Renew prescription",10],["Check direct debits",10],["File paperwork",15]],x:[["Cancel unused subscriptions",10],["Check credit score",5],["Update CV",30],["That thing you keep avoiding",20],["Back up phone photos",15],["Unsubscribe from junk emails",15]]},
selfcare:{l:"Looking After You",ic:"o",c:"var(--cs)",t:[["Take your meds",2],["Drink 2L water",1],["No phone for 1 hour",60],["Bed before 11pm",1],["Call someone you love",15],["Read 10 pages",15],["Gratitude list (3 things)",5],["Fresh air (15 min)",15],["Make your bed",3],["Eat a proper meal",20]],x:[["Noise cancelling break",15],["Weighted blanket (20 min)",20],["Stimming break",10],["Sensory reset",15],["Pomodoro: 25/5",30],["Low demand hour",60]]}
};

var KW={hygiene:["tan","hair","nails","skin","bath","shower","face","moistur","shav","brow","lip","scrub","mask"],household:["hoover","vacuum","clean","dust","iron","floor","bin","fridge","kitchen","oven","window","tidy","shop","cook","laundry","wipe","descale","bedding"],bean:["bean","dog","pet","paw","treat","bowl","toy","blanket"],creative:["draw","paint","journal","write","read","knit","crochet","colour","craft","diy","bake","collage","letter"],exercise:["walk","run","yoga","stretch","dance","pilates","gym","swim","hiit","workout","skip","stairs"],reminders:["book","appointment","dentist","doctor","gp","therapy","meds","order","bill","bank","finance","prescription"],selfcare:["water","sleep","bed","phone","screen","grateful","meal","eat","rest","break","sensory"]};
function gCat(t){var l=t.toLowerCase();if(l.indexOf("bean")>=0)return"bean";var b="selfcare",s=0;for(var c in KW){var n=0;KW[c].forEach(function(w){if(l.indexOf(w)>=0)n++});if(n>s){s=n;b=c}}return b}

var MODES=[
{k:"chill",l:"Chill Day",d:"Light and easy. Self care, Bean, creative.",cats:["selfcare","bean","creative"],max:120},
{k:"pamper",l:"Pamper Day",d:"Skin, hair, nails, bath. Full reset.",cats:["hygiene","selfcare"],max:180},
{k:"chores",l:"Chores Blitz",d:"Sort the house. Top to bottom.",cats:["household","selfcare","bean"],max:240},
{k:"work",l:"Work Day",d:"Minimal. Morning + evening only.",cats:["selfcare","bean","reminders"],max:90},
{k:"catchup",l:"Catch-Up Day",d:"Life admin, the stuff you keep putting off.",cats:["reminders","household","selfcare"],max:180},
{k:"active",l:"Active Day",d:"Move, walk Bean, get outside.",cats:["exercise","bean","selfcare"],max:150},
{k:"creative",l:"Creative Day",d:"Phone down. Make something. Reset.",cats:["creative","selfcare"],max:180},
{k:"custom",l:"Build My Own",d:"Pick from everything.",cats:Object.keys(CAT),max:300}
];

var ENG=[{v:3,l:"High energy",d:"Bring it on",c:"var(--green)"},{v:2,l:"Medium",d:"Steady pace",c:"var(--amber)"},{v:1,l:"Low battery",d:"Gentle day",c:"var(--coral)"}];
var MOOD=[{v:5,l:"Great",c:"var(--green)"},{v:4,l:"Good",c:"var(--teal)"},{v:3,l:"Okay",c:"var(--amber)"},{v:2,l:"Low",c:"var(--accent)"},{v:1,l:"Rough",c:"var(--coral)"}];
var AMSG=["Added!","On the list!","Locked in!","Sorted!","Got it!"];
var DMSG=["Done!","Smashed it.","Ticked off.","Boom.","Sorted.","Nice one."];

var RDEF=[
{text:"Take your meds",cat:"selfcare",block:"morning",days:[0,1,2,3,4,5,6],id:1,mins:2},
{text:"Walk Bean (30 min)",cat:"bean",block:"morning",days:[0,1,2,3,4,5,6],id:2,mins:35},
{text:"Drink 2L water",cat:"selfcare",block:"anytime",days:[0,1,2,3,4,5,6],id:3,mins:1},
{text:"Make your bed",cat:"selfcare",block:"morning",days:[0,1,2,3,4,5,6],id:4,mins:3}
];

// State
var S={
tasks:LS("tasks",[]),date:TD(),tab:"plan",
spending:LS("spending",{budget:20,items:[]}),
moods:LS("moods",{}),checkins:LS("checkins",{}),
energy:LS("energy",{}),dayMode:LS("dayMode",{}),
recurring:LS("recurring",RDEF),rolled:LS("rolled",""),
streaks:LS("streaks",{}),
openCats:{},pools:{},
pendingRollover:null
};
function sv(){SS("tasks",S.tasks);SS("spending",S.spending);SS("moods",S.moods);SS("checkins",S.checkins);SS("energy",S.energy);SS("dayMode",S.dayMode);SS("recurring",S.recurring);SS("rolled",S.rolled);SS("streaks",S.streaks)}

function boot(){
var td=TD();if(S.rolled===td)return;
// Check for missed tasks from yesterday
var y=new Date();y.setDate(y.getDate()-1);var ys=y.toISOString().split("T")[0];
var inc=S.tasks.filter(function(t){return t.date===ys&&!t.done});
if(inc.length>0){
// Store for rollover prompt instead of auto-rolling
S.pendingRollover=inc;
}
// Add recurring tasks
var dow=new Date().getDay(),adj=dow===0?6:dow-1;
var have={};S.tasks.filter(function(t){return t.date===td}).forEach(function(t){have[t.text]=1});
S.recurring.forEach(function(r){if(r.days.indexOf(adj)>=0&&!have[r.text])S.tasks.push({id:uid(),text:r.text,done:false,cat:r.cat,date:td,rolledOver:false,block:r.block,mins:r.mins||15})});
updSt();S.rolled=td;sv();
}

function doRollover(selected){
var td=TD();
selected.forEach(function(t){
S.tasks.push({id:uid(),text:t.text,done:false,cat:t.cat,date:td,rolledOver:true,block:t.block,mins:t.mins||15});
});
S.pendingRollover=null;sv();render();
}

function updSt(){
var track=["Take your meds","Walk Bean","Drink 2L water","Make your bed"];
track.forEach(function(task){
var c=0;for(var i=0;i<30;i++){
var d=new Date();d.setDate(d.getDate()-i);var ds=d.toISOString().split("T")[0];
var prefix=task.split(" ").slice(0,2).join(" ");
var found=S.tasks.filter(function(t){return t.date===ds&&t.text.indexOf(prefix)===0&&t.done});
if(found.length)c++;else if(i>0)break;
}S.streaks[task]=c;
});
}

function h(tag,a){
var el=document.createElement(tag);
if(a){for(var k in a){var v=a[k];if(k==="style"&&typeof v==="object"){for(var s in v)el.style[s]=v[s]}else if(k==="onClick"){el.addEventListener("click",v)}else if(k==="onInput"){el.addEventListener("input",v)}else if(k==="onKeydown"){el.addEventListener("keydown",v)}else if(k==="onChange"){el.addEventListener("change",v)}else if(k==="className"){el.className=v}else{el.setAttribute(k,v)}}}
for(var i=2;i<arguments.length;i++){var c=arguments[i];if(c==null)continue;if(Array.isArray(c)){c.forEach(function(x){if(x!=null)el.append(typeof x==="string"||typeof x==="number"?String(x):x)})}else{el.append(typeof c==="string"||typeof c==="number"?String(c):c)}}
return el;
}

function toast(msg,bg){var t=document.getElementById("toast");t.textContent=msg;t.style.background=bg||"var(--green)";t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show")},1800)}
function showSh(c){var bg=document.getElementById("sbg"),sh=document.getElementById("sht");sh.innerHTML="";sh.append(c);bg.classList.add("show");sh.classList.add("show");bg.onclick=hideSh}
function hideSh(){document.getElementById("sbg").classList.remove("show");document.getElementById("sht").classList.remove("show")}

function addTP(text,cat,mins){
if(!text.trim())return;
var c=cat||gCat(text),m=mins||15;
var el=h("div",{});
el.append(h("div",{style:{fontSize:"16px",fontWeight:800,marginBottom:"2px"}},"When?"));
el.append(h("div",{style:{fontSize:"13px",color:"var(--t2)",marginBottom:"16px"}},text+" ("+fM(m)+")"));
var grid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}});
var dayT=S.tasks.filter(function(t){return t.date===S.date});
BLK.forEach(function(b){
var used=0;dayT.forEach(function(t){if(t.block===b.key&&!t.done)used+=(t.mins||15)});
var pct=b.cap<999?Math.min(100,Math.round(((used+m)/b.cap)*100)):0;
var full=b.cap<999&&(used+m)>b.cap;
var btn=h("button",{style:{padding:"16px",background:"var(--bg2)",border:"2px solid "+(full?"var(--coral)":b.color),borderRadius:"14px",textAlign:"left",opacity:full?"0.5":"1"},onClick:function(){
S.tasks.push({id:uid(),text:text.trim(),done:false,cat:c,date:S.date,rolledOver:false,block:b.key,mins:m});
sv();hideSh();toast(AMSG[Math.floor(Math.random()*AMSG.length)],b.color);render();
}});
btn.append(h("div",{style:{fontSize:"15px",fontWeight:800,color:b.color,marginBottom:"4px"}},b.label));
if(b.cap<999){
var bar=h("div",{className:"fb",style:{marginBottom:"3px"}});bar.append(h("div",{className:"fi",style:{width:pct+"%",background:full?"var(--coral)":b.color}}));
btn.append(bar);btn.append(h("div",{style:{fontSize:"11px",color:full?"var(--coral)":"var(--t3)",fontWeight:700}},fM(used)+"/"+fM(b.cap)));
}else{btn.append(h("div",{style:{fontSize:"11px",color:"var(--t3)",fontWeight:600}},"No time limit"))}
grid.append(btn);
});
el.append(grid);
el.append(h("button",{style:{width:"100%",marginTop:"14px",padding:"14px",background:"var(--bg)",borderRadius:"12px",color:"var(--t3)",fontWeight:700,fontSize:"14px"},onClick:hideSh},"Cancel"));
showSh(el);
}

function togT(id){var t;S.tasks.forEach(function(x){if(x.id===id)t=x});if(!t)return;if(!t.done)toast(DMSG[Math.floor(Math.random()*DMSG.length)],"var(--green)");t.done=!t.done;updSt();sv();render()}
function delT(id){S.tasks=S.tasks.filter(function(t){return t.id!==id});sv();render()}

function startTmr(task){
var mins=Math.min(task.mins||25,60),rem=mins*60,on=true;
var ov=h("div",{className:"tmr"});
var disp=h("div",{style:{fontSize:"64px",fontWeight:900,fontVariantNumeric:"tabular-nums"}});
function upd(){var m=Math.floor(rem/60),s=rem%60;disp.textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")}upd();
