<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#141418">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.svg">
<title>Brain Dump</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#141418;color:#DDD;font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100dvh;overscroll-behavior:none}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
input,button,select,textarea{font-family:inherit;font-size:16px}
input::placeholder{color:#555}
button{cursor:pointer;transition:all .15s ease;border:none;background:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
.modal-box{background:#1E1E2A;border-radius:20px;max-width:500px;width:100%;max-height:85dvh;overflow:hidden;display:flex;flex-direction:column;border:1px solid #333}
.modal-body{flex:1;overflow-y:auto;padding:12px 16px;-webkit-overflow-scrolling:touch}
.card{background:#1E1E2A;border-radius:10px;border:1px solid #2A2A3A;overflow:hidden}
.card-btn{width:100%;display:flex;align-items:center;gap:8px;padding:12px 14px;background:none;border:none;text-align:left}
.tag{border-radius:7px;padding:5px 10px;font-size:12px;font-weight:700;border:1px solid #3A3A4A;background:#2A2A3A;color:#AAA}
.tag.on{border-color:var(--c);color:var(--c);background:color-mix(in srgb,var(--c) 12%,#1E1E2A)}
.wrap{display:flex;flex-wrap:wrap;gap:4px}
.chevron{font-size:14px;color:#444;transition:transform .2s}
.chevron.open{transform:rotate(180deg)}
#app{padding-bottom:40px}
.header{background:#1A1A22;padding:18px 16px 14px;border-bottom:1px solid #2A2A3A}
.inner{max-width:520px;margin:0 auto}
.content{padding:12px 14px 0;max-width:520px;margin:0 auto}
.task{position:relative;display:flex;align-items:center;gap:10px;padding:12px;border-radius:10px;background:#1E1E2A;border:1px solid #2A2A3A;animation:slideIn .2s ease}
.task.done{opacity:.45;background:rgba(139,196,160,.05);border-color:rgba(139,196,160,.12)}
.check{width:26px;height:26px;border-radius:7px;border:2.5px solid var(--c);background:transparent;display:flex;align-items:center;justify-content:center;font-size:13px;color:#1E1E2A;font-weight:900;flex-shrink:0;min-width:26px}
.check.done{background:#8BC4A0;border-color:#8BC4A0}
.slot-btn{font-size:10px;font-weight:700;color:#666;background:#2A2A3A;border:1px solid #3A3A4A;border-radius:6px;padding:4px 8px;flex-shrink:0;white-space:nowrap}
.cat-icon{font-size:11px;font-weight:800;padding:3px 7px;border-radius:5px;flex-shrink:0}
.progress-bar{height:4px;background:#2A2A3A;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .5s ease}
.nav-btn{background:#1E1E2A;border:1px solid #2A2A3A;border-radius:8px;padding:8px 14px;color:#666;font-size:11px;font-weight:700}
.hdr-btn{background:#2A2A3A;border:1px solid #3A3A4A;border-radius:6px;padding:5px 8px;color:#888;font-size:9px;font-weight:800;letter-spacing:.5px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── DATA ──
const LS=(k,d)=>{try{const v=localStorage.getItem("bd_"+k);return v?JSON.parse(v):d}catch{return d}};
const SS=(k,v)=>{try{localStorage.setItem("bd_"+k,JSON.stringify(v))}catch{}};
const getToday=()=>new Date().toISOString().split("T")[0];
const WKDAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const getWeekDates=r=>{const d=new Date(r+"T12:00:00"),dy=d.getDay(),df=d.getDate()-dy+(dy===0?-6:1),m=new Date(d);m.setDate(df);return Array.from({length:7},(_,i)=>{const x=new Date(m);x.setDate(m.getDate()+i);return x.toISOString().split("T")[0]})};
const fmtDate=s=>new Date(s+"T12:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});
const fmtShort=s=>new Date(s+"T12:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short"});

const SLOTS=[
  {key:"morning",label:"Morning",icon:"◑",time:"7:00"},{key:"before_work",label:"Before Work",icon:"▸",time:"8:00"},
  {key:"10am",label:"10am",icon:"·",time:"10:00"},{key:"lunch",label:"Lunch",icon:"◐",time:"12:00"},
  {key:"2pm",label:"2pm",icon:"·",time:"14:00"},{key:"after_work",label:"After Work",icon:"◂",time:"17:00"},
  {key:"evening",label:"Evening",icon:"◕",time:"19:00"},{key:"anytime",label:"Anytime",icon:"○",time:null}
];

const CATS={
  hygiene:{label:"Pamper + Hygiene",icon:"✦",color:"#E8A0BF",
    tasks:[["Fake tan",3],["Hair wash day",2],["Do my nails",2],["Full skincare routine",2],["Relax bath",3],["Everything shower",4],["Face mask",2],["Shave legs",1],["Deep condition hair",2],["Exfoliate",1],["Eyebrow tidy",1],["Moisturise properly",1],["Dry brush before shower",1],["Lip scrub + balm",1]],
    extras:[["Hair oil treatment",2],["Foot soak + scrub",2],["Gua sha session",2],["Clean makeup brushes",2],["Scalp massage",1],["Sheet mask evening",2],["Body butter after bath",1],["Trim split ends",1],["Organise skincare shelf",1],["Double cleanse properly",1]]},
  household:{label:"Sort The House",icon:"◈",color:"#7EC8B8",
    tasks:[["Change bedding",2],["Wash the floors",2],["Hoover upstairs",1],["Hoover downstairs",1],["Put a wash on",1],["Hang washing up",1],["Weekly food shop",3],["Clean bathroom",2],["Wipe kitchen sides",1],["Empty all bins",1],["Tidy living room",1],["Sort the fridge",1],["Ironing pile",2],["Dust surfaces",1],["Descale kettle",1]],
    extras:[["Clean windows",2],["Organise under sink",2],["Deep clean microwave",1],["Wipe door handles",1],["Sort recycling",1],["Tidy junk drawer",1],["Wash kitchen towels",1],["Clean behind sofa",2],["Defrost freezer",3],["Wipe skirting boards",2]]},
  bean:{label:"Bean",icon:"♥",color:"#D4A574",
    tasks:[["Walk Bean (15 min)",1],["Walk Bean (30 min)",2],["Walk Bean (45 min)",3],["Walk Bean (1 hour)",4],["Bath Bean",3],["Wash Bean's toys",2],["Wash Bean's blankets",2],["Meal prep for Bean",2],["Brush Bean",1],["Trim Bean's nails",1],["Clean Bean's bowls",1],["Refill treat jar",1]],
    extras:[["Training session (10 min)",1],["Enrichment toy time",1],["Clean Bean's bed",2],["Worm/flea treatment",1],["New walk route",3],["Dental chew",1],["Socialise Bean",2],["Paw wash after walk",1],["Check Bean's ears",1]]},
  creative:{label:"Creative (phone down)",icon:"◐",color:"#C4A0E8",
    tasks:[["Draw or doodle (20 min)",2],["Journal / brain dump",1],["Try a new recipe",3],["Rearrange a room",2],["DIY project",3],["Write a letter",2],["Colouring book",2],["Read for 30 mins",2],["Knit or crochet",2],["Try calligraphy",2],["Redecorate a shelf",1]],
    extras:[["Collage from magazines",2],["Bake from scratch",3],["Sketch the view from your window",2],["Make homemade cards",2],["Try origami",1],["Watercolour painting",2],["Press flowers",1],["Macrame or bracelets",2]]},
  exercise:{label:"Move Your Body",icon:"△",color:"#8BC4A0",
    tasks:[["30 min walk with podcast",2],["Yoga session",2],["10 min stretch",1],["Dance around the house",1],["Pilates video",2],["Go for a run",3],["Skipping rope (10 min)",1],["HIIT workout (15 min)",1],["Ab workout",1],["Stairs x10",1],["YouTube workout",2]],
    extras:[["Swim at local pool",3],["Park workout",2],["Gentle walk",1],["Resistance bands",2],["Wall sits while kettle boils",1],["Foam roller session",1],["Gardening counts!",2],["Cleaning as cardio",1]]},
  reminders:{label:"Life Admin",icon:"◇",color:"#E8C170",
    tasks:[["Order meds",1],["Finance spreadsheet",2],["Check bills are paid",1],["Book GP appointment",1],["Therapy session",3],["Check bank balance",1],["Reply to that message",1],["Book dentist",1],["Renew prescription",1],["Check direct debits",1],["File paperwork",1]],
    extras:[["Cancel unused subscriptions",1],["Check credit score",1],["Update CV",2],["Sort out that thing you keep avoiding",2],["Back up phone photos",2],["Unsubscribe from junk emails",1],["Book eye test",1],["Check passport expiry",1]]},
  selfcare:{label:"Looking After You",icon:"○",color:"#E89090",
    tasks:[["Take your meds",1],["Drink 2L water",1],["No phone for 1 hour",1],["Bed before 11pm",1],["Call someone you love",1],["Read 10 pages",1],["Gratitude list (3 things)",1],["Fresh air (15 min)",1],["Make your bed",1],["Eat a proper meal",1]],
    extras:[["Noise cancelling headphones break",1],["Weighted blanket (20 min)",1],["Stimming break",1],["Sensory reset in quiet room",1],["Pomodoro: 25 on / 5 off",2],["Low demand hour",1],["Cancel plans guilt-free",1]]}
};

const KW={hygiene:["tan","hair","nails","skin","bath","shower","face","moistur","exfol","shav","teeth","brow","lash","lip","scrub","mask","condition"],household:["hoover","vacuum","wash","clean","dust","iron","bed","floor","bin","fridge","kitchen","oven","window","tidy","shop","cook","meal prep","laundry","wipe","descale"],bean:["bean","dog","pet","paw","treat","bowl","toy","blanket"],creative:["draw","paint","journal","write","read","knit","crochet","colour","craft","diy","bake","collage","letter","origami"],exercise:["walk","run","yoga","stretch","dance","pilates","gym","swim","hiit","workout","skip","stairs"],reminders:["book","appointment","dentist","doctor","gp","therapy","meds","order","bill","bank","finance","insurance","renew","prescription"],selfcare:["water","sleep","bed","phone","screen","grateful","meal","eat","rest","break","quiet","sensory"]};
function guessCat(t){const l=t.toLowerCase();if(l.includes("bean"))return"bean";let b="selfcare",bs=0;for(const[c,ws]of Object.entries(KW)){const s=ws.filter(w=>l.includes(w)).length;if(s>bs){bs=s;b=c}}return b}

const CHEERS=["Done!","Smashed it.","Ticked off.","Another one down.","Look at you go.","Boom. Done.","Sorted.","On a roll.","Nice one.","Knocked it out."];
const MOODS=[{v:5,l:"Great",c:"#8BC4A0"},{v:4,l:"Good",c:"#7EC8B8"},{v:3,l:"Okay",c:"#E8C170"},{v:2,l:"Low",c:"#E8A0BF"},{v:1,l:"Rough",c:"#E89090"}];
const REC_DEF=[{text:"Take your meds",category:"selfcare",slot:"morning",days:[0,1,2,3,4,5,6],id:1},{text:"Walk Bean (30 min)",category:"bean",slot:"morning",days:[0,1,2,3,4,5,6],id:2},{text:"Drink 2L water",category:"selfcare",slot:"anytime",days:[0,1,2,3,4,5,6],id:3},{text:"Make your bed",category:"selfcare",slot:"morning",days:[0,1,2,3,4,5,6],id:4}];
const SHOP={Essentials:["Bread","Milk","Eggs","Butter","Cheese","Chicken","Mince","Rice","Pasta","Tinned tomatoes","Onions","Potatoes","Bananas","Apples"],Snacks:["Crisps","Biscuits","Chocolate","Popcorn","Cereal bars","Fruit","Yoghurts","Nuts"],Freezer:["Frozen pizza","Chips","Ice cream","Frozen veg","Fish fingers","Garlic bread","Waffles"],"Household bits":["Washing up liquid","Loo roll","Bin bags","Kitchen roll","Laundry tabs","Surface spray","Dishwasher tabs"],"ADHD friendly":["Pre-chopped veg","Microwave rice pouches","Ready meals for bad days","Meal deal bits","Batch cook ingredients","Protein bars","Frozen fruit for smoothies"]};

// ── STATE ──
let state={
  tasks:LS("tasks",[]),
  selectedDate:getToday(),
  view:"day",
  inputSlot:"anytime",
  spending:LS("spending",{budget:20,items:[]}),
  moods:LS("moods",{}),
  checkins:LS("checkins",{}),
  recurring:LS("recurring",REC_DEF),
  rolled:LS("rolled",""),
  openCats:{},
  catPools:{},
  modal:null
};

function saveAll(){SS("tasks",state.tasks);SS("spending",state.spending);SS("moods",state.moods);SS("checkins",state.checkins);SS("recurring",state.recurring);SS("rolled",state.rolled)}

// Rollover + recurring
function doRollover(){
  const today=getToday();
  if(state.rolled===today)return;
  const y=new Date();y.setDate(y.getDate()-1);const ys=y.toISOString().split("T")[0];
  const inc=state.tasks.filter(t=>t.date===ys&&!t.done);
  if(inc.length){
    const ids=new Set(inc.map(t=>t.id));
    state.tasks=state.tasks.filter(t=>!ids.has(t.id));
    inc.forEach(t=>state.tasks.push({...t,id:Date.now()+Math.random(),date:today,rolledOver:true}));
  }
  const dow=new Date().getDay(),adj=dow===0?6:dow-1;
  const todayTexts=new Set(state.tasks.filter(t=>t.date===today).map(t=>t.text));
  state.recurring.forEach(r=>{
    if(r.days.includes(adj)&&!todayTexts.has(r.text))
      state.tasks.push({id:Date.now()+Math.random()+Math.random(),text:r.text,done:false,category:r.category,date:today,rolledOver:false,slot:r.slot,est:1,recurring:true});
  });
  state.rolled=today;saveAll();
}

function addTask(text,cat,est=1){
  if(!text.trim())return;
  state.tasks.push({id:Date.now()+Math.random(),text:text.trim(),done:false,category:cat||guessCat(text),date:state.selectedDate,rolledOver:false,slot:state.inputSlot,est});
  saveAll();render();
}

function toggleTask(id){state.tasks=state.tasks.map(t=>t.id===id?{...t,done:!t.done}:t);saveAll();render()}
function deleteTask(id){state.tasks=state.tasks.filter(t=>t.id!==id);saveAll();render()}
function cycleSlot(id){const t=state.tasks.find(x=>x.id===id);if(!t)return;const i=SLOTS.findIndex(s=>s.key===t.slot);t.slot=SLOTS[(i+1)%SLOTS.length].key;saveAll();render()}

function exportDay(){
  const d=state.selectedDate,ts=state.tasks.filter(t=>t.date===d);
  const lines=[`Brain Dump: ${fmtDate(d)}`,""];
  const grouped={};ts.forEach(t=>{const s=t.slot||"anytime";(grouped[s]=grouped[s]||[]).push(t)});
  SLOTS.forEach(s=>{if(grouped[s.key]){lines.push(`--- ${s.label} ---`);grouped[s.key].forEach(t=>lines.push(`${t.done?"[x]":"[ ]"} ${t.text}`));lines.push("")}});
  const m=state.moods[d];if(m)lines.push(`Mood: ${MOODS.find(x=>x.v===m)?.l||"?"}`);
  const n=state.checkins[d];if(n)lines.push(`Note: ${n}`);
  const b=new Blob([lines.join("\n")],{type:"text/plain"}),u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download=`brain-dump-${d}.txt`;a.click();URL.revokeObjectURL(u);
}

// ── RENDER ──
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)for(const[k,v]of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else el.setAttribute(k,v);
  }
  children.flat(9).forEach(c=>{if(c==null)return;el.append(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c)});
  return el;
}

function renderModal(){
  const existing=document.querySelector(".modal-bg");if(existing)existing.remove();
  if(!state.modal)return;
  const bg=h("div",{className:"modal-bg",onClick:e=>{if(e.target===bg){state.modal=null;renderModal()}}});
  const box=h("div",{className:"modal-box"});

  if(state.modal==="shop")renderShopModal(box);
  else if(state.modal==="report")renderReportModal(box);
  else if(state.modal==="recurring")renderRecurringModal(box);

  bg.append(box);document.body.append(bg);
}

function modalHeader(box,title,sub,color){
  const hdr=h("div",{style:{padding:"16px 18px",background:color||"#2A2A3A",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}});
  const left=h("div",{},h("h2",{style:{fontSize:"17px",fontWeight:800,color:"#fff"}},title));
  if(sub)left.append(h("p",{style:{margin:"2px 0 0",fontSize:"11px",color:"rgba(255,255,255,.7)",fontWeight:600}},sub));
  const close=h("button",{style:{background:"rgba(255,255,255,.15)",borderRadius:"8px",width:"32px",height:"32px",fontSize:"14px",color:"#fff",fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"},onClick:()=>{state.modal=null;renderModal()}},"✕");
  hdr.append(left,close);box.append(hdr);
}

function renderShopModal(box){
  let items=[], checked=new Set();
  modalHeader(box,"Weekly Shop","Tap to add, check off in store","linear-gradient(135deg,#7EC8B8,#8BC4A0)");
  const body=h("div",{className:"modal-body"});
  function drawShop(){
    body.innerHTML="";
    for(const[cat,sugs]of Object.entries(SHOP)){
      body.append(h("h3",{style:{fontSize:"10px",fontWeight:800,color:"#666",textTransform:"uppercase",letterSpacing:"1.5px",margin:"12px 0 5px"}},cat));
      const wrap=h("div",{className:"wrap"});
      sugs.forEach(item=>{
        const added=items.includes(item);
        wrap.append(h("button",{className:"tag"+(added?" on":""),style:{"--c":"#7EC8B8"},onClick:()=>{if(added){items=items.filter(x=>x!==item);checked.delete(item)}else items.push(item);drawShop()}},added?"✓ "+item:item));
      });
      body.append(wrap);
    }
    // Custom input
    const row=h("div",{style:{display:"flex",gap:"5px",margin:"12px 0"}});
    const inp=h("input",{style:{flex:1,border:"1px solid #3A3A4A",borderRadius:"8px",padding:"8px 10px",background:"#2A2A3A",color:"#EEE",outline:"none"},placeholder:"Add your own..."});
    row.append(inp,h("button",{style:{background:"#7EC8B8",borderRadius:"8px",padding:"8px 12px",color:"#1E1E2A",fontWeight:800},onClick:()=>{if(inp.value.trim()){items.push(inp.value.trim());inp.value="";drawShop()}}},"Add"));
    body.append(row);
    // Copy button
    if(items.length)body.append(h("button",{style:{width:"100%",background:"#2A2A3A",border:"1px solid #3A3A4A",borderRadius:"8px",padding:"8px",color:"#7EC8B8",fontWeight:800,fontSize:"12px",marginBottom:"8px"},onClick:()=>{navigator.clipboard?.writeText(items.map(i=>`${checked.has(i)?"[x]":"[ ]"} ${i}`).join("\n"));alert("Copied!")}},"Copy list to clipboard"));
    // List
    if(items.length){
      const list=h("div",{style:{background:"#2A2A3A",borderRadius:"12px",padding:"12px",border:"1px solid #3A3A4A"}});
      list.append(h("h3",{style:{margin:"0 0 6px",fontSize:"13px",fontWeight:800,color:"#7EC8B8"}},`Your list (${items.filter(i=>!checked.has(i)).length} left)`));
      items.forEach(item=>{
        const ch=checked.has(item);
        const r=h("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:"8px 0",borderBottom:"1px solid #333",cursor:"pointer"},onClick:()=>{ch?checked.delete(item):checked.add(item);drawShop()}});
        r.append(h("div",{style:{width:"22px",height:"22px",borderRadius:"5px",border:"2px solid",borderColor:ch?"#8BC4A0":"#555",background:ch?"#8BC4A0":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",color:"#1E1E2A",fontWeight:900,flexShrink:0}},ch?"✓":""));
        r.append(h("span",{style:{fontSize:"14px",fontWeight:600,color:ch?"#555":"#DDD",textDecoration:ch?"line-through":"none"}},item));
        list.append(r);
      });
      body.append(list);
    }
  }
  drawShop();box.append(body);
}

function renderReportModal(box){
  const wd=getWeekDates(state.selectedDate);
  const cs={};Object.keys(CATS).forEach(k=>cs[k]={t:0,d:0});
  let tA=0,dA=0;
  wd.forEach(date=>state.tasks.filter(t=>t.date===date).forEach(t=>{const c=t.category||"selfcare";if(cs[c]){cs[c].t++;if(t.done)cs[c].d++}tA++;if(t.done)dA++}));
  const pct=tA>0?Math.round(dA/tA*100):0;
  const struggling=Object.entries(cs).filter(([,v])=>v.t>=3&&v.d/v.t<.4).map(([k])=>CATS[k].label);
  const strong=Object.entries(cs).filter(([,v])=>v.t>=2&&v.d/v.t>=.8).map(([k])=>CATS[k].label);
  const wm=wd.map(d=>state.moods[d]).filter(Boolean);
  const avgM=wm.length?wm.reduce((s,m)=>s+m,0)/wm.length:null;

  modalHeader(box,"Weekly Report",null,"linear-gradient(135deg,#C4A0E8,#E8A0BF)");
  const body=h("div",{className:"modal-body"});
  body.append(h("div",{style:{textAlign:"center",margin:"16px 0"}},
    h("div",{style:{fontSize:"44px",fontWeight:900,color:pct>=70?"#8BC4A0":pct>=40?"#E8C170":"#E89090"}},pct+"%"),
    h("div",{style:{fontSize:"12px",color:"#777"}},`${dA} of ${tA} tasks`)
  ));
  if(avgM!==null){const ml=MOODS.find(m=>m.v===Math.round(avgM));body.append(h("div",{style:{background:"#2A2A3A",borderRadius:"10px",padding:"12px",margin:"0 0 12px",border:"1px solid #3A3A4A",textAlign:"center"}},h("div",{style:{fontSize:"11px",fontWeight:700,color:"#888"}},"Average mood"),h("div",{style:{fontSize:"20px",fontWeight:900,color:ml?.c||"#AAA"}},ml?.l||"?")));}
  Object.entries(cs).filter(([,v])=>v.t>0).forEach(([k,v])=>{
    const cat=CATS[k],p=v.t>0?Math.round(v.d/v.t*100):0;
    const row=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}});

function renderRecurringModal(box){

      info.append(h("div",{style:{fontSize:"10px",color:"#666"}},(SLOTS.find(s=>s.key===r.slot)?.label||"Anytime")+" / "+r.days.map(d=>WKDAYS[d]).join(", ")));
      row.append(info);
      row.append(h("button",{style:{color:"#555",fontSize:"12px",padding:"4px"},onClick:()=>{state.recurring=state.recurring.filter(x=>(x.id||x.text)!==(r.id||r.text));saveAll();drawRec()}},"✕"));

function render(){

    const r=new SR();r.continuous=false;r.interimResults=false;r.lang="en-GB";

  const addRow=h("div",{style:{display:"flex",gap:"4px",marginBottom:"6px"}});
