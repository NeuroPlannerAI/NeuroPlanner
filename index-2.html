function calcStreaks(tasks){const track=["Take your meds","Walk Bean","Drink 2L water","Make your bed"];const st={};track.forEach(task=>{let c=0;const pfx=task.split(" ").slice(0,2).join(" ");for(let i=0;i<30;i++){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split("T")[0];if(tasks.some(t=>t.date===ds&&t.text.startsWith(pfx)&&t.done))c++;else if(i>0)break}st[task]=c});return st}

{id:"q1",th:"Day to day",text:"Pick the one that sounds most like your brain on a normal day.",multi:false,opts:[{id:"a",text:"A hundred tabs open, none of them loading properly",tags:["attention","adhd"]},{id:"b",text:"One tab open, but I've been staring at it for two hours without starting",tags:["paralysis","adhd"]},{id:"c",text:"Laser focused on the wrong thing entirely",tags:["hyperfocus","adhd"]},{id:"d",text:"Constantly waiting for something to feel urgent enough to actually do",tags:["urgency","adhd"]},{id:"e",text:"Running on anxiety — it's the only thing that gets me moving",tags:["anxiety"]},{id:"f",text:"Pretty steady, honestly — my brain generally does what I need it to",tags:["baseline"],n:true}]},
{id:"q2",th:"Hard days",text:"What does a hard day actually look like for you?",multi:true,max:3,opts:[{id:"a",text:"I can't get out of bed even though I'm awake",tags:["paralysis"]},{id:"b",text:"Everything feels too loud, too bright, too much",tags:["sensory","autism"]},{id:"c",text:"I snap at people I care about and hate myself for it",tags:["dysreg"]},{id:"d",text:"I scroll for hours because I can't face anything real",tags:["avoidance"]},{id:"e",text:"I feel like I'm performing 'fine' while falling apart inside",tags:["masking"]},{id:"f",text:"I forget to eat, drink water, or look after myself at all",tags:["interoception"]},{id:"g",text:"I spend money I don't have on things I don't need",tags:["impulse"]},{id:"h",text:"Hard days are rare for me — I'm mostly here to optimise",tags:["baseline"],n:true}]},
{id:"q3",th:"Self-relationship",text:"When you mess something up — even something small — what's your internal response?",multi:false,opts:[{id:"a",text:"I spiral into 'I'm just fundamentally broken' pretty fast",tags:["shame","rsd"]},{id:"b",text:"I laugh it off in the moment and fall apart privately later",tags:["delayed","masking"]},{id:"c",text:"I get stuck replaying it for days",tags:["rumination","ocd"]},{id:"d",text:"I get really frustrated with myself — like, genuinely angry",tags:["self_anger"]},{id:"e",text:"I usually let it go fairly quickly — everyone makes mistakes",tags:["baseline"],n:true}]},
{id:"q4",th:"Masking",text:"How much energy do you spend making yourself seem 'normal' to other people?",multi:false,opts:[{id:"a",text:"I'm exhausted by the end of most days from it",tags:["high_masking","autism"]},{id:"b",text:"I do it automatically now — I don't even notice",tags:["auto_masking"]},{id:"c",text:"Certain situations I mask, others I don't bother",tags:["selective_masking"]},{id:"d",text:"I'm not sure what 'normal' is supposed to look like for me",tags:["identity"]},{id:"e",text:"Not much — I stopped trying to hide it a while ago",tags:["unmasked"]},{id:"f",text:"I don't feel like I have to mask — I'm comfortable being myself",tags:["baseline"],n:true}]},
{id:"q5",th:"Relationships",text:"When you care about someone — a partner, a close friend — how does it tend to go?",multi:false,opts:[{id:"a",text:"They become really important to me — sometimes more than I am to myself",tags:["idealisation","bpd"]},{id:"b",text:"I worry constantly that I'm too much — or not enough",tags:["rsd","anxious"]},{id:"c",text:"I pull people close and then panic and push them away",tags:["disorganised","bpd"]},{id:"d",text:"I go quiet when things get tense because conflict feels unbearable",tags:["conflict_avoidance"]},{id:"e",text:"I find it hard to let people in, so I keep most at arm's length",tags:["avoidant"]},{id:"f",text:"Pretty steadily — relationships are one of the easier parts of life for me",tags:["baseline"],n:true}]},

{id:"q7",th:"Social energy",text:"After spending time with people — even people you like — how do you feel?",multi:false,opts:[{id:"a",text:"Drained. I need time alone to recover even from good interactions",tags:["social_exhaustion","autism"]},{id:"b",text:"Fine if it was one or two people, wrecked if it was a group",tags:["group_sensitivity"]},{id:"c",text:"I replay everything I said and pick apart what came out wrong",tags:["rumination","social_anxiety"]},{id:"d",text:"Usually okay but I never quite feel like I fit naturally",tags:["outsider"]},{id:"e",text:"Energised — being around people actually helps me",tags:["extrovert"]},{id:"f",text:"Depends on the people, but generally fine",tags:["baseline"],n:true}]},

{id:"q10",th:"Thought loops",text:"Do you ever get stuck in a loop — a thought or worry you can't stop replaying?",multi:false,opts:[{id:"a",text:"Yes — about specific situations, what I said, what someone meant",tags:["rumination","ocd"]},{id:"b",text:"Yes — about worst-case scenarios that probably won't happen",tags:["catastrophising","anxiety"]},{id:"c",text:"Yes — about relationships, whether people are okay with me",tags:["rocd","rsd"]},{id:"d",text:"Yes — about decisions, whether I made the right choice",tags:["decision_paralysis","ocd"]},{id:"e",text:"Sometimes, but I can usually pull myself out",tags:["mild"]},{id:"f",text:"Not really — I don't tend to get stuck on things",tags:["baseline"],n:true}]},

{checkins[date+"_ai"]&&<div style={{marginTop:12,padding:14,background:"var(--lilac)08",borderRadius:12,border:"1px solid var(--lilac)15"}}><div style={{fontSize:10,fontWeight:700,color:"var(--lilac)",letterSpacing:1,marginBottom:6,fontFamily:"var(--fh)"}}>REFLECTION</div><div style={{fontSize:14,lineHeight:1.7}}>{checkins[date+"_ai"]}</div></div>}</div>

<div style={crd}><div style={sec}>DAILY BUDGET</div>
{(()=>{const bgt=spending.budget||20;const tI=(spending.items||[]).filter(i=>i.date===TD());const sp=tI.reduce((s,i)=>s+i.amount,0);const left=bgt-sp;return <>
<div style={{fontSize:36,fontWeight:800,color:left<0?"var(--coral)":left<5?"var(--accent)":"var(--green)",fontFamily:"var(--fh)"}}>£{left.toFixed(2)}</div>
<div style={{fontSize:12,color:"var(--t3)",marginBottom:10}}>of £{bgt} today</div>
<div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}><span style={{fontSize:12,fontWeight:600,color:"var(--t3)"}}>Limit:</span><input type="number" value={spending.budget||20} onChange={e=>setSpending(p=>({...p,budget:parseFloat(e.target.value)||0}))} style={{width:60,background:"var(--bg2)",border:"1px solid var(--bdr)",borderRadius:8,padding:"6px 8px",outline:"none",fontWeight:700,textAlign:"center",fontSize:14}}/></div>
<div style={{display:"flex",gap:8,marginBottom:10}}><input value={spendD} onChange={e=>setSpendD(e.target.value)} placeholder="What for?" style={{flex:1,background:"var(--bg2)",border:"1px solid var(--bdr)",borderRadius:10,padding:10,outline:"none",fontSize:14}}/><input value={spendA} onChange={e=>setSpendA(e.target.value)} type="number" step="0.01" placeholder="£" style={{width:60,background:"var(--bg2)",border:"1px solid var(--bdr)",borderRadius:10,padding:10,outline:"none",fontSize:14}}/><button onClick={()=>{const a=parseFloat(spendA);if(isNaN(a)||a<=0)return;setSpending(p=>({...p,items:[...(p.items||[]),{amount:a,desc:spendD||"Something",date:TD(),id:uid()}]}));toast("-£"+a.toFixed(2),"var(--coral)");setSpendD("");setSpendA("")}} style={{background:"var(--accent)",borderRadius:10,padding:"10px 14px",color:"#111",fontWeight:800,fontSize:16}}>+</button></div>
{tI.map(item=><div key={item.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid var(--bdr)"}}><span style={{fontSize:13,color:"var(--t2)"}}>{item.desc}</span><span style={{fontSize:13,fontWeight:700,color:"var(--coral)"}}>-£{item.amount.toFixed(2)}</span></div>)}</>})()}</div>

<div style={crd}><div style={sec}>MEDICATION</div>
<button onClick={()=>setMedLog(p=>({...p,[date]:{...p[date],taken:!(p[date]?.taken)}}))} style={{padding:"10px 16px",background:medLog[date]?.taken?"var(--green)15":"var(--card2)",border:"1.5px solid "+(medLog[date]?.taken?"var(--green)":"var(--bdr)"),borderRadius:12,color:medLog[date]?.taken?"var(--green)":"var(--t3)",fontWeight:600,fontSize:13,display:"flex",alignItems:"center",gap:6,marginBottom:10}}>{medLog[date]?.taken&&<Ic n="check" s={14} c="var(--green)"/>}{medLog[date]?.taken?"Taken":"Not taken yet"}</button>
<div style={{fontSize:12,color:"var(--t4)",marginBottom:6}}>How do you feel on meds today?</div>
<div style={{display:"flex",gap:4}}>{[1,2,3,4,5].map(v=><button key={v} onClick={()=>setMedLog(p=>({...p,[date]:{...p[date],feelRating:v}}))} style={{flex:1,padding:"8px 0",borderRadius:8,fontSize:13,fontWeight:medLog[date]?.feelRating===v?700:400,background:medLog[date]?.feelRating===v?"var(--teal)15":"var(--card2)",border:"1.5px solid "+(medLog[date]?.feelRating===v?"var(--teal)":"var(--bdr)"),color:medLog[date]?.feelRating===v?"var(--teal)":"var(--t4)"}}>{v}</button>)}</div></div>

<div style={crd}><div style={sec}>SOCIAL BATTERY</div>
<div style={{display:"flex",gap:6}}>{["Alone","Low","Med","Social","Drained"].map((l,i)=>{const v=i+1;const on=socialBat[date]===v;const c=v<=2?"var(--green)":v===3?"var(--accent)":"var(--coral)";return <button key={l} onClick={()=>setSocialBat(p=>({...p,[date]:v}))} style={{flex:1,padding:"8px 4px",borderRadius:10,fontSize:11,fontWeight:on?700:500,background:on?c+"15":"var(--card2)",border:"1.5px solid "+(on?c:"var(--bdr)"),color:on?c:"var(--t4)"}}>{l}</button>})}</div></div>

<div style={crd}><div style={sec}>STREAKS</div>{Object.entries(streaks).map(([n,c])=><div key={n} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid var(--bdr)"}}><span style={{fontSize:13,fontWeight:600}}>{n}</span><span style={{fontSize:14,fontWeight:800,color:c>0?"var(--green)":"var(--t4)"}}>{c>0?"🔥 "+c+" days":"—"}</span></div>)}</div>

<div style={crd}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={sec}>AUTO REMINDERS</div><button onClick={()=>setShowAddRec(true)} style={{fontSize:11,fontWeight:700,color:"var(--accent)",padding:"4px 12px",background:"var(--accent)12",borderRadius:8,border:"1px solid var(--accent)20"}}>+ Add</button></div>
{recurring.map(r=>{const bL=BLK.find(b=>b.key===r.block)?.label||"Anytime";return <div key={r.id||r.text} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid var(--bdr)"}}><span style={{width:4,height:18,borderRadius:2,background:CC[r.cat]||CC.selfcare,flexShrink:0}}/><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{r.text}</div><div style={{fontSize:11,color:"var(--t3)"}}>{bL} · {r.days.map(d=>WK[d]).join(", ")} · {fM(r.mins||15)}</div></div><button onClick={()=>setRecurring(p=>p.filter(x=>(x.id||x.text)!==(r.id||r.text)))} style={{color:"var(--t4)",padding:6}}><Ic n="x" s={14}/></button></div>})}</div>

<div style={crd}><div style={sec}>DOOM SCROLL ALTERNATIVE</div><div style={{fontSize:14,lineHeight:1.7}}>{TIPS[Math.floor(Math.random()*TIPS.length)]}</div></div>
</>}

{tab==="insights"&&<InsightsView tasks={tasks} date={date} setDate={setDate} setTab={setTab} moods={moods}/>}

</div></div>

<button onClick={()=>setShowCrisis(true)} style={{position:"fixed",right:16,bottom:100,width:52,height:52,borderRadius:"50%",background:"var(--coral)",boxShadow:"0 4px 20px rgba(208,136,120,.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,animation:"breathe 3s ease infinite"}}><Ic n="heart" s={22} c="#fff"/></button>

<div style={{display:"flex",background:"var(--card)",borderTop:"1px solid var(--bdr)",padding:"6px 8px calc(6px + env(safe-area-inset-bottom))",gap:2,flexShrink:0}}>
{[{id:"plan",l:"Plan",ic:"plan"},{id:"pick",l:"Tasks",ic:"tasks"},{id:"today",l:"My Day",ic:"today"},{id:"life",l:"Life",ic:"life"},{id:"insights",l:"Insights",ic:"insights"}].map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"8px 0",borderRadius:12,fontSize:10,fontWeight:tab===t.id?700:500,color:tab===t.id?"var(--accent)":"var(--t4)",background:tab===t.id?"var(--accent)10":"transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:3,transition:"all .2s",fontFamily:"var(--fh)"}}><Ic n={t.ic} s={18} c={tab===t.id?"var(--accent)":"var(--t4)"}/><span>{t.l}</span></button>)}
</div></div>}

function AddRecForm({onAdd,onClose}){const[t,setT]=useState("");const[b,setB]=useState("morning");const[d,setD]=useState([0,1,2,3,4,5,6]);const[m,setM]=useState(15);
return <><input value={t} onChange={e=>setT(e.target.value)} placeholder="Task name..." style={{width:"100%",background:"var(--bg2)",border:"1px solid var(--bdr)",borderRadius:10,padding:12,outline:"none",fontSize:14,marginBottom:10}}/>
<div style={{fontSize:11,fontWeight:700,color:"var(--t3)",letterSpacing:.5,marginBottom:6,fontFamily:"var(--fh)"}}>Duration</div>
<div style={{display:"flex",gap:4,marginBottom:12,flexWrap:"wrap"}}>{[5,10,15,30,45,60].map(v=><button key={v} onClick={()=>setM(v)} style={{padding:"6px 12px",borderRadius:8,fontSize:12,fontWeight:600,background:m===v?"var(--accent)":"var(--card2)",color:m===v?"#111":"var(--t3)",border:"1px solid var(--bdr)"}}>{v}m</button>)}</div>
<div style={{fontSize:11,fontWeight:700,color:"var(--t3)",letterSpacing:.5,marginBottom:6,fontFamily:"var(--fh)"}}>Time block</div>
<div style={{display:"flex",gap:4,marginBottom:12}}>{BLK.map(bl=><button key={bl.key} onClick={()=>setB(bl.key)} style={{padding:"6px 12px",borderRadius:8,fontSize:12,fontWeight:600,background:b===bl.key?bl.color:"var(--card2)",color:b===bl.key?"#111":"var(--t3)",border:"1px solid var(--bdr)"}}>{bl.label}</button>)}</div>
<div style={{fontSize:11,fontWeight:700,color:"var(--t3)",letterSpacing:.5,marginBottom:6,fontFamily:"var(--fh)"}}>Days</div>
<div style={{display:"flex",gap:4,marginBottom:16}}>{WK.map((day,i)=><button key={day} onClick={()=>setD(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i])} style={{flex:1,padding:"8px 0",borderRadius:8,fontSize:11,fontWeight:700,background:d.includes(i)?"var(--lilac)20":"var(--card2)",color:d.includes(i)?"var(--lilac)":"var(--t4)",border:"1px solid "+(d.includes(i)?"var(--lilac)30":"var(--bdr)")}}>{day}</button>)}</div>
<button onClick={()=>{if(!t.trim())return;onAdd({text:t.trim(),cat:gCat(t),block:b,days:[...d],mins:m,id:uid()})}} style={{width:"100%",padding:14,background:t.trim()?"var(--accent)":"var(--bdr)",borderRadius:12,color:t.trim()?"#111":"var(--t4)",fontWeight:700}}>Add Reminder</button>
<button onClick={onClose} style={{width:"100%",marginTop:8,padding:12,background:"var(--bg)",borderRadius:12,color:"var(--t3)",fontWeight:600}}>Cancel</button></>}

function InsightsView({tasks,date,setDate,setTab,moods}){
const wd=wkD(date);const cs={};Object.keys(CAT).forEach(k=>cs[k]={t:0,d:0});let tA=0,dA=0;
wd.forEach(dt=>tasks.filter(t=>t.date===dt).forEach(t=>{const c=t.cat||"selfcare";if(cs[c]){cs[c].t++;if(t.done)cs[c].d++}tA++;if(t.done)dA++}));
const wp=tA>0?Math.round(dA/tA*100):0;const wm=wd.map(d=>moods[d]).filter(Boolean);const avgM=wm.length?wm.reduce((s,m)=>s+m,0)/wm.length:null;
const struggling=Object.entries(cs).filter(([,v])=>v.t>=3&&v.d/v.t<.4).map(([k])=>CAT[k].l);
const strong=Object.entries(cs).filter(([,v])=>v.t>=2&&v.d/v.t>=.8).map(([k])=>CAT[k].l);
const sec2={fontSize:11,fontWeight:700,color:"var(--t3)",letterSpacing:1,marginBottom:10,fontFamily:"var(--fh)"};
const crd2={background:"var(--card)",borderRadius:"var(--radius)",boxShadow:"var(--shadow)",padding:18,marginBottom:12};
return <><div style={{fontSize:24,fontWeight:700,fontFamily:"var(--fh)",marginBottom:16}}>This Week</div>
<div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5,marginBottom:18}}>
{wd.map((dt,i)=>{const dts=tasks.filter(t=>t.date===dt),dn=dts.filter(t=>t.done).length,tot=dts.length;const on=dt===date;return <button key={dt} onClick={()=>{setDate(dt);setTab("today")}} style={{background:on?"var(--accent)12":"var(--card)",border:"1.5px solid "+(on?"var(--accent)30":"var(--bdr)"),borderRadius:12,padding:"8px 2px",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
<span style={{fontSize:10,fontWeight:700,color:on?"var(--accent)":"var(--t4)"}}>{WK[i]}</span><span style={{fontSize:17,fontWeight:800,color:on?"var(--t1)":"var(--t2)"}}>{new Date(dt+"T12:00:00").getDate()}</span>
{tot>0?<span style={{fontSize:10,fontWeight:700,color:dn===tot?"var(--green)":"var(--t3)"}}>{dn}/{tot}</span>:<span style={{fontSize:10,color:"var(--t4)"}}>—</span>}
{moods[dt]&&<span style={{width:6,height:6,borderRadius:"50%",background:MDS.find(m=>m.v===moods[dt])?.c||"var(--t4)"}}/>}</button>})}</div>
<div style={{...crd2,textAlign:"center"}}><div style={{fontSize:48,fontWeight:800,color:wp>=70?"var(--green)":wp>=40?"var(--accent)":"var(--coral)",fontFamily:"var(--fh)"}}>{wp}%</div><div style={{fontSize:13,color:"var(--t2)"}}>{dA} of {tA} tasks this week</div></div>
{avgM!==null&&<div style={{...crd2,textAlign:"center"}}><div style={{...sec2}}>AVERAGE MOOD</div><div style={{fontSize:22,fontWeight:800,color:MDS.find(m=>m.v===Math.round(avgM))?.c,marginTop:4}}>{MDS.find(m=>m.v===Math.round(avgM))?.l||"?"}</div></div>}
<div style={crd2}><div style={sec2}>BY CATEGORY</div>
{Object.entries(cs).filter(([,v])=>v.t>0).length===0?<div style={{fontSize:13,color:"var(--t4)"}}>No tasks this week yet</div>:
Object.entries(cs).filter(([,v])=>v.t>0).map(([k,v])=>{const pc=Math.round(v.d/v.t*100);return <div key={k} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
<span style={{width:4,height:16,borderRadius:2,background:CC[k],flexShrink:0}}/><span style={{fontSize:12,fontWeight:600,width:120}}>{CAT[k].l}</span>
<div style={{flex:1,height:5,background:"var(--bg2)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:pc+"%",background:CC[k],borderRadius:3,transition:"width .5s"}}/></div>
<span style={{fontSize:11,fontWeight:700,color:CC[k],width:36,textAlign:"right"}}>{v.d}/{v.t}</span></div>})}</div>
{struggling.length>0&&<div style={crd2}><div style={{...sec2,color:"var(--coral)"}}>FINDING THESE HARD</div><div style={{fontSize:14,fontWeight:600}}>{struggling.join(", ")}</div><div style={{fontSize:12,color:"var(--t3)",marginTop:4}}>Try fewer tasks or smaller steps.</div></div>}
{strong.length>0&&<div style={crd2}><div style={{...sec2,color:"var(--green)"}}>STRENGTHS THIS WEEK</div><div style={{fontSize:14,fontWeight:600}}>{strong.join(", ")}</div></div>}
{wm.length>=3&&<div style={crd2}><div style={sec2}>MOOD TREND</div><div style={{display:"flex",alignItems:"end",gap:4,height:60}}>{wd.map(dt=>{const mv=moods[dt];if(!mv)return <div key={dt} style={{flex:1,height:4,background:"var(--bdr)",borderRadius:2}}/>;return <div key={dt} style={{flex:1,height:(mv/5*100)+"%",background:MDS.find(m=>m.v===mv)?.c,borderRadius:4,transition:"height .3s",minHeight:4}}/>})}</div><div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>{wd.map((dt,i)=><span key={dt} style={{fontSize:9,color:"var(--t4)",flex:1,textAlign:"center"}}>{WK[i]}</span>)}</div></div>}
</>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
